<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Campaign — Brackenroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .join-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 80px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
        }
        .join-logo {
            font-family: 'Cinzel', serif;
            font-size: 0.72em;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--ink-dim);
            text-decoration: none;
        }
        .join-logo:hover { color: var(--gold); }
        .join-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--h-gold-b);
            letter-spacing: 0.04em;
        }
        .join-body {
            color: var(--ink-muted);
            font-style: italic;
            line-height: 1.6;
        }
        .join-code {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.3em;
            background: rgba(201,168,76,0.07);
            border: 1px solid rgba(201,168,76,0.2);
            padding: 10px 28px;
        }
        .join-status {
            font-family: 'Cinzel', serif;
            font-size: 0.78em;
            letter-spacing: 0.1em;
            color: var(--ink-dim);
        }
        .join-status.error { color: #c04040; }
        .btn-google {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #333;
            border: none;
            padding: 12px 28px;
            font-family: 'Cinzel', serif;
            font-size: 0.78em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-google:hover { background: #f0f0f0; }
        .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="join-wrap">
        <a href="index.html" class="join-logo">Brackenroll</a>
        <div class="join-title">You've Been Invited</div>
        <div class="join-body" id="joinBody">You've been invited to join a campaign.</div>
        <div class="join-code" id="joinCode"></div>
        <div class="join-status" id="joinStatus">Sign in to join.</div>
        <button class="btn-google" id="googleSignIn" style="display:none;">
            <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Sign in with Google
        </button>
    </div>

    <script type="module">
        import { onAuthChange, signInWithGoogle, joinCampaignByCode } from './firebase-init.js';

        const params = new URLSearchParams(window.location.search);
        const code   = params.get('code')?.toUpperCase() ?? '';

        const codeEl   = document.getElementById('joinCode');
        const statusEl = document.getElementById('joinStatus');
        const signInBtn = document.getElementById('googleSignIn');

        if (!code) {
            window.location.href = 'index.html';
        }

        codeEl.textContent = code;

        signInBtn.addEventListener('click', () => signInWithGoogle());

        onAuthChange(async user => {
            if (!user) {
                signInBtn.style.display = 'flex';
                statusEl.textContent = 'Sign in to join this campaign.';
                return;
            }

            signInBtn.style.display = 'none';
            statusEl.textContent = 'Joining campaign…';
            statusEl.className = 'join-status';

            try {
                const campaignId = await joinCampaignByCode(user.uid, code);
                statusEl.textContent = 'Joined! Redirecting…';
                window.location.href = `campaign.html?id=${campaignId}`;
            } catch (e) {
                statusEl.textContent = 'Campaign not found. Check your invite link and try again.';
                statusEl.className = 'join-status error';
            }
        });
    </script>
</body>
</html>
