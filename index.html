<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brackenroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hub-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 56px 80px;
        }

        /* Auth gate */
        .auth-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 24px;
            text-align: center;
        }
        .auth-gate h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.4em;
            font-weight: 700;
            color: var(--h-gold-b);
            letter-spacing: 0.04em;
        }
        .auth-gate p {
            color: var(--ink-muted);
            font-style: italic;
            font-size: 1.05em;
        }

        /* Section header */
        .hub-section { margin-bottom: 56px; }
        .hub-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-gold);
        }
        .hub-section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            font-weight: 600;
            color: var(--gold-mid);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* Create button */
        .btn-create {
            font-family: 'Cinzel', serif;
            font-size: 0.7em;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(201,168,76,0.35);
            background: transparent;
            padding: 7px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-create:hover { border-color: var(--gold); background: rgba(201,168,76,0.07); }

        /* Cards grid */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2px;
        }

        /* Campaign card */
        .hub-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px 24px 20px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            transition: all 0.22s;
            cursor: pointer;
        }
        .hub-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }
        .hub-card:hover { background: var(--card-hover); border-color: var(--border-gold); }
        .hub-card:hover::after { opacity: 1; }

        .hub-card-role {
            font-family: 'Cinzel', serif;
            font-size: 0.62em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .hub-card-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .hub-card-meta {
            font-size: 0.85em;
            color: var(--ink-dim);
            flex: 1;
            margin-bottom: 16px;
        }
        .hub-card-link {
            font-family: 'Cinzel', serif;
            font-size: 0.68em;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-dim);
            transition: color 0.2s;
        }
        .hub-card:hover .hub-card-link { color: var(--gold); }

        .role-gm { color: var(--gold); }
        .role-player { color: var(--ink-muted); }

        /* Empty state */
        .hub-empty {
            color: var(--ink-dim);
            font-style: italic;
            font-size: 0.9em;
            padding: 8px 0;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-card, #14110d);
            border: 1px solid var(--border-gold);
            padding: 36px 40px;
            max-width: 440px;
            width: 90%;
        }
        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            font-weight: 600;
            color: var(--gold-mid);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .modal-label {
            font-family: 'Cinzel', serif;
            font-size: 0.72em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            display: block;
            margin-bottom: 8px;
        }
        .modal-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-mid);
            color: var(--ink);
            font-family: 'EB Garamond', serif;
            font-size: 1em;
            padding: 10px 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 24px;
        }
        .modal-input:focus { border-color: var(--gold); }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-cancel {
            font-family: 'Cinzel', serif;
            font-size: 0.7em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            background: transparent;
            border: 1px solid var(--border-mid);
            padding: 9px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:hover { border-color: var(--ink-muted); color: var(--ink-muted); }
        .btn-submit {
            font-family: 'Cinzel', serif;
            font-size: 0.7em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: var(--gold);
            color: #0c0a07;
            border: 1px solid var(--gold);
            padding: 9px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: var(--h-gold-b); }
        .btn-submit:disabled { opacity: 0.5; cursor: default; }
        .modal-error { color: #c04040; font-size: 0.85em; margin-bottom: 16px; display: none; }

        /* Sign in button */
        .btn-google {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #333;
            border: none;
            padding: 12px 28px;
            font-family: 'Cinzel', serif;
            font-size: 0.78em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-google:hover { background: #f0f0f0; }
        .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

        @media (max-width: 700px) {
            .hub-wrap { padding: 32px 20px 60px; }
            .hub-grid { grid-template-columns: 1fr; }
            .modal-box { padding: 28px 24px; }
        }
    </style>
</head>
<body>
    <nav class="site-nav"></nav>

    <div class="hub-wrap">
        <!-- Auth gate (shown when not logged in) -->
        <div class="auth-gate" id="authGate">
            <h1>Brackenroll</h1>
            <p>A Daggerheart virtual tabletop.<br>Sign in to access your campaigns and characters.</p>
            <button class="btn-google" id="googleSignIn">
                <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Sign in with Google
            </button>
        </div>

        <!-- Main hub (shown when logged in) -->
        <div id="hubContent" style="display:none;">

            <!-- Campaigns -->
            <div class="hub-section">
                <div class="hub-section-header">
                    <h2>My Campaigns</h2>
                    <button class="btn-create" id="createCampaignBtn">+ New Campaign</button>
                </div>
                <div class="hub-grid" id="campaignGrid">
                    <p class="hub-empty">Loading campaigns…</p>
                </div>
            </div>

            <!-- Characters -->
            <div class="hub-section">
                <div class="hub-section-header">
                    <h2>My Characters</h2>
                    <a href="character-builder.html" class="btn-create">+ New Character</a>
                </div>
                <div class="hub-grid" id="characterGrid">
                    <p class="hub-empty">Loading characters…</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Create campaign modal -->
    <div class="modal-overlay" id="campaignModal">
        <div class="modal-box">
            <div class="modal-title">New Campaign</div>
            <p class="modal-error" id="campaignModalError"></p>
            <label class="modal-label" for="campaignNameInput">Campaign Name</label>
            <input class="modal-input" id="campaignNameInput" type="text" placeholder="e.g. The Verdant Curse" maxlength="80" autocomplete="off">
            <div class="modal-actions">
                <button class="btn-cancel" id="campaignModalCancel">Cancel</button>
                <button class="btn-submit" id="campaignModalSubmit">Create</button>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script type="module">
        import {
            onAuthChange, signInWithGoogle,
            getCampaigns, createCampaign,
            loadCharacters
        } from './firebase-init.js';

        const authGate   = document.getElementById('authGate');
        const hubContent = document.getElementById('hubContent');
        const campaignGrid   = document.getElementById('campaignGrid');
        const characterGrid  = document.getElementById('characterGrid');
        const modal      = document.getElementById('campaignModal');
        const modalInput = document.getElementById('campaignNameInput');
        const modalError = document.getElementById('campaignModalError');
        const modalSubmit = document.getElementById('campaignModalSubmit');

        document.getElementById('googleSignIn').addEventListener('click', () => signInWithGoogle());

        document.getElementById('createCampaignBtn').addEventListener('click', () => {
            modalInput.value = '';
            modalError.style.display = 'none';
            modal.classList.add('open');
            modalInput.focus();
        });

        document.getElementById('campaignModalCancel').addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

        modalSubmit.addEventListener('click', async () => {
            const name = modalInput.value.trim();
            if (!name) { showModalError('Please enter a campaign name.'); return; }
            modalSubmit.disabled = true;
            modalSubmit.textContent = 'Creating…';
            try {
                const id = await createCampaign(currentUser.uid, name);
                modal.classList.remove('open');
                window.location.href = `campaign.html?id=${id}`;
            } catch (e) {
                showModalError('Something went wrong. Try again.');
                modalSubmit.disabled = false;
                modalSubmit.textContent = 'Create';
            }
        });

        modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') modalSubmit.click(); });

        function showModalError(msg) {
            modalError.textContent = msg;
            modalError.style.display = 'block';
        }

        let currentUser = null;

        onAuthChange(async user => {
            if (!user) {
                authGate.style.display = 'flex';
                hubContent.style.display = 'none';
                return;
            }
            currentUser = user;
            authGate.style.display = 'none';
            hubContent.style.display = 'block';
            loadHub(user);
        });

        async function loadHub(user) {
            const [campaigns, characters] = await Promise.all([
                getCampaigns(user.uid),
                loadCharacters(user.uid)
            ]);
            renderCampaigns(campaigns, user.uid);
            renderCharacters(characters);
        }

        function renderCampaigns(campaigns, uid) {
            campaignGrid.innerHTML = '';
            if (campaigns.length === 0) {
                campaignGrid.innerHTML = '<p class="hub-empty">No campaigns yet. Create one or join one with an invite link.</p>';
                return;
            }
            campaigns
                .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0))
                .forEach(c => {
                    const isOwner = c.ownerUid === uid;
                    const card = document.createElement('a');
                    card.className = 'hub-card';
                    card.href = `campaign.html?id=${c.id}`;
                    card.innerHTML = `
                        <div class="hub-card-role ${isOwner ? 'role-gm' : 'role-player'}">${isOwner ? 'Game Master' : 'Player'}</div>
                        <div class="hub-card-name">${escHtml(c.name)}</div>
                        <div class="hub-card-meta">${c.memberUids.length} member${c.memberUids.length !== 1 ? 's' : ''}</div>
                        <span class="hub-card-link">View Campaign →</span>`;
                    campaignGrid.appendChild(card);
                });
        }

        function renderCharacters(characters) {
            characterGrid.innerHTML = '';
            if (characters.length === 0) {
                characterGrid.innerHTML = '<p class="hub-empty">No characters yet. Create your first one above.</p>';
                return;
            }
            characters.forEach(ch => {
                const card = document.createElement('a');
                card.className = 'hub-card';
                card.href = `character-sheet.html?id=${ch.id}`;
                card.innerHTML = `
                    <div class="hub-card-role">${escHtml(ch.className ?? '')}</div>
                    <div class="hub-card-name">${escHtml(ch.name ?? 'Unnamed')}</div>
                    <div class="hub-card-meta">Level ${ch.sheetState?.level ?? 1}</div>
                    <span class="hub-card-link">Open Sheet →</span>`;
                characterGrid.appendChild(card);
            });
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
