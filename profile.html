<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — Brackenroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 56px 80px;
        }

        /* Section card */
        .profile-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 32px 36px;
            margin-bottom: 16px;
        }
        .profile-section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.82em;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold-mid);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-mid);
        }

        /* Fields */
        .profile-field { margin-bottom: 20px; }
        .profile-field:last-of-type { margin-bottom: 0; }
        .profile-label {
            font-family: 'Cinzel', serif;
            font-size: 0.7em;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-dim);
            display: block;
            margin-bottom: 8px;
        }
        .profile-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-mid);
            color: var(--ink);
            font-family: 'EB Garamond', serif;
            font-size: 1em;
            padding: 10px 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .profile-input:focus { border-color: var(--gold); }
        .profile-input:disabled {
            opacity: 0.45;
            cursor: default;
        }
        .profile-hint {
            font-size: 0.82em;
            color: var(--ink-dim);
            font-style: italic;
            margin-top: 6px;
        }

        /* Color swatches */
        .color-swatches {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .color-swatch {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            outline: none;
        }
        .color-swatch:hover { transform: scale(1.12); }
        .color-swatch.selected { border-color: #fff; transform: scale(1.12); }

        /* Avatar preview */
        .avatar-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .avatar-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            font-weight: 700;
            color: rgba(0,0,0,0.6);
        }
        .avatar-name {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: var(--ink-muted);
        }

        /* Save button */
        .btn-save {
            font-family: 'Cinzel', serif;
            font-size: 0.72em;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            background: var(--gold);
            color: #0c0a07;
            border: 1px solid var(--gold);
            padding: 11px 28px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 24px;
            transition: background 0.2s;
        }
        .btn-save:hover { background: var(--h-gold-b); }
        .btn-save:disabled { opacity: 0.5; cursor: default; }

        /* Status messages */
        .profile-success {
            font-size: 0.85em;
            color: #5a9e5a;
            margin-top: 12px;
            display: none;
        }
        .profile-error {
            font-size: 0.85em;
            color: #c04040;
            margin-top: 12px;
            display: none;
        }

        @media (max-width: 700px) {
            .profile-wrap { padding: 28px 20px 60px; }
            .profile-section { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <nav class="site-nav"></nav>
    <script type="module" src="nav.js"></script>

    <div class="page-hero">
        <div class="page-hero-inner">
            <div class="page-hero-tag">Account</div>
            <h1>Edit Profile</h1>
            <p class="subtitle">Your identity at the table</p>
        </div>
    </div>

    <div class="profile-wrap">

        <!-- Profile section -->
        <div class="profile-section">
            <div class="profile-section-title">Profile</div>

            <!-- Avatar preview -->
            <div class="avatar-preview">
                <div class="avatar-circle" id="avatarCircle"></div>
                <span class="avatar-name" id="avatarName"></span>
            </div>

            <div class="profile-field">
                <label class="profile-label" for="displayNameInput">Display Name</label>
                <input class="profile-input" id="displayNameInput" type="text" maxlength="40" autocomplete="off" placeholder="How you appear to other players">
            </div>

            <div class="profile-field">
                <label class="profile-label">Avatar Color</label>
                <div class="color-swatches" id="colorSwatches"></div>
            </div>

            <button class="btn-save" id="saveProfileBtn">Save Changes</button>
            <p class="profile-success" id="profileSuccess">Profile updated.</p>
            <p class="profile-error" id="profileError"></p>
        </div>

        <!-- Password section (email users only) -->
        <div class="profile-section" id="passwordSection" style="display:none;">
            <div class="profile-section-title">Change Password</div>

            <div class="profile-field">
                <label class="profile-label" for="currentPassword">Current Password</label>
                <input class="profile-input" id="currentPassword" type="password" autocomplete="current-password" placeholder="••••••••">
            </div>
            <div class="profile-field">
                <label class="profile-label" for="newPassword">New Password</label>
                <input class="profile-input" id="newPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters">
            </div>
            <div class="profile-field">
                <label class="profile-label" for="confirmPassword">Confirm New Password</label>
                <input class="profile-input" id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat new password">
            </div>

            <button class="btn-save" id="savePasswordBtn">Update Password</button>
            <p class="profile-success" id="passwordSuccess">Password updated.</p>
            <p class="profile-error" id="passwordError"></p>
        </div>

        <!-- Account info -->
        <div class="profile-section">
            <div class="profile-section-title">Account</div>
            <div class="profile-field">
                <label class="profile-label">Email</label>
                <input class="profile-input" id="emailDisplay" type="text" disabled>
            </div>
            <div class="profile-field">
                <label class="profile-label">Sign-in Method</label>
                <input class="profile-input" id="providerDisplay" type="text" disabled>
            </div>
        </div>

    </div>

    <script type="module">
        import {
            onAuthChange, getUserProfile, updateUserProfile,
            isEmailUser, changePassword
        } from './firebase-init.js';

        const COLORS = [
            { hex: '#c0392b', name: 'Crimson'  },
            { hex: '#2980b9', name: 'Sapphire' },
            { hex: '#27ae60', name: 'Emerald'  },
            { hex: '#8e44ad', name: 'Amethyst' },
            { hex: '#d4ac0d', name: 'Gold'     },
            { hex: '#ca6f1e', name: 'Copper'   },
            { hex: '#717d7e', name: 'Steel'    },
            { hex: '#c0609a', name: 'Rose'     },
        ];

        let currentUser = null;
        let selectedColor = '';

        // ── Color swatches ────────────────────────────────────────────────────
        const swatchWrap = document.getElementById('colorSwatches');
        COLORS.forEach(c => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'color-swatch';
            btn.style.background = c.hex;
            btn.title = c.name;
            btn.addEventListener('click', () => {
                selectedColor = c.hex;
                swatchWrap.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                btn.classList.add('selected');
                updateAvatarPreview();
            });
            swatchWrap.appendChild(btn);
        });

        function updateAvatarPreview() {
            const name = document.getElementById('displayNameInput').value.trim();
            const initial = name ? name.charAt(0).toUpperCase() : '?';
            const circle = document.getElementById('avatarCircle');
            circle.style.background = selectedColor || 'var(--border-mid)';
            circle.textContent = initial;
            document.getElementById('avatarName').textContent = name || 'Display Name';
        }

        document.getElementById('displayNameInput').addEventListener('input', updateAvatarPreview);

        // ── Auth ──────────────────────────────────────────────────────────────
        onAuthChange(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            await loadProfile(user);
        });

        async function loadProfile(user) {
            const profile = await getUserProfile(user.uid);

            // Display name
            const nameInput = document.getElementById('displayNameInput');
            nameInput.value = profile?.displayName || user.displayName || '';

            // Color
            selectedColor = profile?.avatarColor || COLORS[0].hex;
            swatchWrap.querySelectorAll('.color-swatch').forEach(btn => {
                if (btn.style.background === selectedColor || btn.style.backgroundColor === selectedColor) {
                    btn.classList.add('selected');
                }
            });
            // Match by hex value
            swatchWrap.querySelectorAll('.color-swatch').forEach(btn => {
                const matches = COLORS.find(c => c.hex === selectedColor);
                if (matches && btn.title === matches.name) btn.classList.add('selected');
            });

            updateAvatarPreview();

            // Account info
            document.getElementById('emailDisplay').value = user.email || '—';
            const emailAuth = isEmailUser();
            document.getElementById('providerDisplay').value = emailAuth ? 'Email & Password' : 'Google';
            if (emailAuth) document.getElementById('passwordSection').style.display = 'block';
        }

        // ── Save profile ──────────────────────────────────────────────────────
        document.getElementById('saveProfileBtn').addEventListener('click', async () => {
            const name = document.getElementById('displayNameInput').value.trim();
            const err  = document.getElementById('profileError');
            const ok   = document.getElementById('profileSuccess');
            hide(err); hide(ok);

            if (!name) { show(err, 'Display name cannot be empty.'); return; }

            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true; btn.textContent = 'Saving…';
            try {
                await updateUserProfile(currentUser.uid, {
                    displayName: name,
                    avatarColor: selectedColor
                });
                show(ok);
                setTimeout(() => hide(ok), 3000);
            } catch (e) {
                show(err, 'Failed to save. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Save Changes';
            }
        });

        // ── Change password ───────────────────────────────────────────────────
        document.getElementById('savePasswordBtn').addEventListener('click', async () => {
            const current  = document.getElementById('currentPassword').value;
            const next     = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('confirmPassword').value;
            const err      = document.getElementById('passwordError');
            const ok       = document.getElementById('passwordSuccess');
            hide(err); hide(ok);

            if (!current || !next || !confirm) { show(err, 'Please fill in all fields.'); return; }
            if (next.length < 6)               { show(err, 'New password must be at least 6 characters.'); return; }
            if (next !== confirm)               { show(err, 'Passwords do not match.'); return; }

            const btn = document.getElementById('savePasswordBtn');
            btn.disabled = true; btn.textContent = 'Updating…';
            try {
                await changePassword(current, next);
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                show(ok);
                setTimeout(() => hide(ok), 3000);
            } catch (e) {
                const msgs = {
                    'auth/wrong-password':      'Current password is incorrect.',
                    'auth/invalid-credential':  'Current password is incorrect.',
                    'auth/too-many-requests':   'Too many attempts. Try again later.',
                    'auth/requires-recent-login': 'Please sign out and sign back in before changing your password.',
                };
                show(err, msgs[e.code] ?? 'Failed to update password. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Update Password';
            }
        });

        function show(el, msg) { if (msg) el.textContent = msg; el.style.display = 'block'; }
        function hide(el) { el.style.display = 'none'; }
    </script>
</body>
</html>
