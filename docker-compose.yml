version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: brackenroll-dev
    volumes:
      - ./:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brackenroll-dev.rule=Host(`devverheart.fwbgaming.win`)"
      - "traefik.http.routers.brackenroll-dev.entrypoints=websecure"
      - "traefik.http.routers.brackenroll-dev.tls=true"
      - "traefik.http.routers.brackenroll-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.brackenroll-dev.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  proxy:
    external: true
