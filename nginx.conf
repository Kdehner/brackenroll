server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /data/ {
        alias /usr/share/nginx/data/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }
}
