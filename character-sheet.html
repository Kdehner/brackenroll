        const groupName = document.createElement('div'); groupName.className = 'dc-card-name'; groupName.textContent = label;
        const alwaysTag = document.createElement('span'); alwaysTag.className = 'dc-tag';
        alwaysTag.style.cssText = 'border-color:rgba(80,140,80,0.5);color:rgba(80,140,80,0.9);';
        alwaysTag.textContent = 'Always Active';
        groupHdr.append(groupName, alwaysTag);
        groupEl.appendChild(groupHdr);

        features.forEach(f => {
            const fWrap = document.createElement('div');
            fWrap.style.cssText = 'margin-top:6px;padding-top:6px;border-top:1px solid var(--border);';
            const fName = document.createElement('div');
            fName.style.cssText = 'font-family:Cinzel,serif;font-size:0.72em;font-weight:700;color:var(--ink);margin-bottom:2px;';
            fName.textContent = f.name;
            const fDesc = document.createElement('div'); fDesc.className = 'dc-card-desc';
            const tmp = document.createElement('div'); tmp.innerHTML = f.description || '';
            fDesc.textContent = tmp.textContent;
            fWrap.append(fName, fDesc);
            groupEl.appendChild(fWrap);
        });
        return groupEl;
    }

    // Subclass
    const subclass = (cls?.subclasses || []).find(s => s.name === char.subclassName);
    if (subclass) {
        const subLvl = char.sheetState.level ?? 1;
        const features = [
            ...(subclass.features?.foundation     || []),
            ...(subLvl >= 5 ? (subclass.features?.specialization || []) : []),
            ...(subLvl >= 8 ? (subclass.features?.mastery        || []) : []),
        ];
        if (features.length) abilitySec.appendChild(makeAbilityGroup(`Subclass · ${subclass.name}`, features));
    }

    // Ancestry
    const ancestryObj = ancestries.find(a => a.name === char.ancestry);
    if (ancestryObj?.features?.length) {
        abilitySec.appendChild(makeAbilityGroup(`Ancestry · ${ancestryObj.name}`, ancestryObj.features));
    }

    // Community
    const communityObj = communities.find(c => c.name === char.community);
    if (communityObj?.features?.length) {
        abilitySec.appendChild(makeAbilityGroup(`Community · ${communityObj.name}`, communityObj.features));
    }

    // Multiclass features (only picked features, grouped by secondary class)
    const multiclasses = char.sheetState.multiclasses ?? [];
    multiclasses.forEach(mc => {
        const mcCls = classes.find(c => c.id === mc.classId);
        const mcSub = (mcCls?.subclasses || []).find(s => s.name === mc.subclassName);
        if (!mcSub || !mc.features.length) return;
        const allFoundation = mcSub.features?.foundation || [];
        const pickedFeatures = mc.features.map(fname => {
            const f = allFoundation.find(ff => (typeof ff === 'string' ? ff : ff.name) === fname);
            if (!f) return null;
            return typeof f === 'string' ? { name: f, description: '' } : f;
        }).filter(Boolean);
        if (pickedFeatures.length) abilitySec.appendChild(makeAbilityGroup(`${mcCls.name} · ${mc.subclassName} (Multiclass)`, pickedFeatures));
    });

    if (!subclass && !ancestryObj && !communityObj && !multiclasses.length) {
        const none = document.createElement('p');
        none.style.cssText = 'font-size:0.85em;color:var(--ink-dim);font-style:italic;';
        none.textContent = 'No abilities found.';
        abilitySec.appendChild(none);
    }

    tabPanels.abilities.appendChild(abilitySec);

    // ── Domains tab ──
    const domSec = document.createElement('div');
    domSec.className = 'sheet-section';

    // All domain cards owned: creation picks + any added on sheet
    // All count equally toward the 5-card loadout limit.
    // Subclass/ancestry/community cards are separate (always active, not tracked here).
    const LOADOUT_LIMIT = 5;
    const locs = char.sheetState.cardLocations;   // { [cardName]: 'vault' } — absence = loadout
    const sheetCards = char.sheetState.learnedCards; // cards added via sheet editor
    const cardState = char.sheetState.cardState;  // { [cardName]: { exhausted, tokens } }

    // Unified pool: creation cards first, then sheet-added cards
    const allOwnedCards = [
        ...(char.domainCards || []),
        ...sheetCards.filter(n => !(char.domainCards || []).includes(n)),
    ];
    const loadoutCards = allOwnedCards.filter(n => !locs[n]);
    const vaultCards   = allOwnedCards.filter(n =>  locs[n]);
    const loadoutCount = loadoutCards.length;
    const overLimit    = loadoutCount > LOADOUT_LIMIT;

    // Section title with loadout counter
    const dcTitleEl = document.createElement('div');
    dcTitleEl.className = 'section-title';
    dcTitleEl.style.marginBottom = '14px';
    dcTitleEl.innerHTML = `<span class="section-title-inner">Domain Cards</span>`;
    const dcCounterEl = document.createElement('span');
    dcCounterEl.className = 'dc-counter' + (overLimit ? ' over' : '');
    dcCounterEl.style.cssText = 'font-family:Cinzel,serif;font-size:0.68em;letter-spacing:0.06em;flex-shrink:0;';
    dcCounterEl.textContent = `${loadoutCount} / ${LOADOUT_LIMIT}`;
    dcTitleEl.appendChild(dcCounterEl);
    domSec.appendChild(dcTitleEl);

    function makeDcCardEl(cardName) {
        const card = domainCards.find(c => c.name === cardName || c.id === cardName);
        const inVault = !!locs[cardName];
        if (!cardState[cardName]) cardState[cardName] = { exhausted: false, tokens: 0 };
        const cs = cardState[cardName];
        const el = document.createElement('div');
        el.className = 'dc-card' + (inVault ? ' in-vault' : '') + (!inVault && cs.exhausted ? ' exhausted' : '');

        const hdr = document.createElement('div'); hdr.className = 'dc-card-header';
        const nameEl = document.createElement('div'); nameEl.className = 'dc-card-name';
        nameEl.textContent = card ? card.name : cardName;
        const meta = document.createElement('div'); meta.className = 'dc-card-meta';

        if (card?.domain) {
            const tag = document.createElement('span'); tag.className = 'dc-tag'; tag.textContent = card.domain;
            meta.appendChild(tag);
        }
        if (card?.type) {
            const tag2 = document.createElement('span'); tag2.className = 'dc-tag'; tag2.textContent = card.type;
            meta.appendChild(tag2);
        }
        if (card?.recallCost > 0) {
            const rcTag = document.createElement('span');
            rcTag.className = 'dc-tag';
            rcTag.style.cssText = 'border-color:rgba(160,100,30,0.5);color:rgba(140,80,20,0.9);';
            rcTag.title = `Recall Cost: mark ${card.recallCost} Stress to swap in mid-session`;
            rcTag.textContent = `R${card.recallCost}`;
            meta.appendChild(rcTag);
        }

        const locBtn = document.createElement('button');
        locBtn.type = 'button';
        locBtn.className = 'dc-location-btn' + (inVault ? '' : ' vault');
        locBtn.textContent = inVault ? '→ Loadout' : '→ Vault';
        if (!inVault && overLimit) { locBtn.disabled = false; } // vaulting always allowed
        if (inVault && loadoutCount >= LOADOUT_LIMIT) {
            locBtn.disabled = true;
            locBtn.style.opacity = '0.4';
            locBtn.title = 'Loadout full — vault a card first';
        }
        locBtn.addEventListener('click', () => {
            if (inVault) {
                if (loadoutCount >= LOADOUT_LIMIT) return;
                delete locs[cardName];
            } else {
                locs[cardName] = 'vault';
            }
            scheduleSave(); renderBody(cls, domains);
        });
        meta.appendChild(locBtn);


        hdr.append(nameEl, meta);
        el.appendChild(hdr);

        if (card?.description) {
            const desc = document.createElement('div'); desc.className = 'dc-card-desc'; desc.textContent = card.description;
            el.appendChild(desc);
        }

        // Card use controls — only for loadout cards (vaulted cards can't be used)
        if (!inVault) {
            const footer = document.createElement('div'); footer.className = 'dc-card-footer';

            // Exhaust toggle
            const exhaustBtn = document.createElement('button');
            exhaustBtn.type = 'button';
            exhaustBtn.className = 'dc-exhaust-btn' + (cs.exhausted ? ' used' : '');
            exhaustBtn.textContent = cs.exhausted ? '✓ Exhausted' : '○ Use';
            exhaustBtn.addEventListener('click', () => {
                cs.exhausted = !cs.exhausted;
                scheduleSave(); renderBody(cls, domains);
            });
            footer.appendChild(exhaustBtn);

            // Token counter
            const tokenCtrl = document.createElement('div'); tokenCtrl.className = 'dc-token-ctrl';
            const tokenLabel = document.createElement('span'); tokenLabel.textContent = 'Tokens:';
            const minusBtn = document.createElement('button'); minusBtn.textContent = '−'; minusBtn.type = 'button';
            minusBtn.addEventListener('click', () => { if (cs.tokens > 0) { cs.tokens--; scheduleSave(); renderBody(cls, domains); } });
            const tokenCount = document.createElement('span'); tokenCount.className = 'dc-token-count'; tokenCount.textContent = cs.tokens;
            const plusBtn = document.createElement('button'); plusBtn.textContent = '+'; plusBtn.type = 'button';
            plusBtn.addEventListener('click', () => { cs.tokens++; scheduleSave(); renderBody(cls, domains); });
            tokenCtrl.append(tokenLabel, minusBtn, tokenCount, plusBtn);
            footer.appendChild(tokenCtrl);

            el.appendChild(footer);
        }

        return el;
    }

    // Loadout section
    const loadoutHdr = document.createElement('div'); loadoutHdr.className = 'dc-section-header'; loadoutHdr.style.marginTop = '0';
    const loadoutLbl = document.createElement('span'); loadoutLbl.className = 'dc-section-label'; loadoutLbl.textContent = 'Loadout';
    loadoutHdr.appendChild(loadoutLbl);
    if (overLimit) {
        const warn = document.createElement('span'); warn.className = 'dc-hand-warning'; warn.style.marginLeft = '8px';
        warn.textContent = `Over limit — vault ${loadoutCount - LOADOUT_LIMIT} card${loadoutCount - LOADOUT_LIMIT > 1 ? 's' : ''}`;
        loadoutHdr.appendChild(warn);
    }
    domSec.appendChild(loadoutHdr);
    if (loadoutCards.length) {
        loadoutCards.forEach(name => domSec.appendChild(makeDcCardEl(name)));
    } else {
        const none = document.createElement('p'); none.style.cssText = 'font-size:0.85em;color:var(--ink-dim);font-style:italic;'; none.textContent = 'No cards in loadout.';
        domSec.appendChild(none);
    }

    // Vault section (only shown if there are vaulted cards)
    if (vaultCards.length) {
        const vaultHdr = document.createElement('div'); vaultHdr.className = 'dc-section-header'; vaultHdr.style.marginTop = '14px';
        const vaultLbl = document.createElement('span'); vaultLbl.className = 'dc-section-label'; vaultLbl.textContent = 'Vault';
        vaultHdr.appendChild(vaultLbl);
        domSec.appendChild(vaultHdr);
        vaultCards.forEach(name => domSec.appendChild(makeDcCardEl(name)));
    }

    // Add a domain card to the pool
    {
        const addWrap = document.createElement('div'); addWrap.className = 'dc-add-wrap';
        const addLbl = document.createElement('div'); addLbl.className = 'dc-section-label'; addLbl.style.marginBottom = '6px'; addLbl.textContent = 'Add Domain Card';
        const dcInput = document.createElement('input');
        dcInput.type = 'text'; dcInput.className = 'dc-search-input'; dcInput.placeholder = 'Search by name or domain…';
        const dcResults = document.createElement('div'); dcResults.className = 'dc-search-results';
        function renderDcResults(q) {
            dcResults.innerHTML = '';
            if (!q.trim()) return;
            domainCards.filter(c => !allOwnedCards.includes(c.name) && !allOwnedCards.includes(c.id) &&
                (c.name.toLowerCase().includes(q.toLowerCase()) || (c.domain || '').toLowerCase().includes(q.toLowerCase()))
            ).slice(0, 15).forEach(c => {
                const row = document.createElement('div'); row.className = 'dc-result-row';
                const n = document.createElement('div'); n.className = 'dc-result-name'; n.textContent = c.name;
                const d = document.createElement('div'); d.className = 'dc-result-domain'; d.textContent = c.domain || '';
                row.append(n, d);
                row.addEventListener('click', () => {
                    sheetCards.push(c.name);
                    scheduleSave(); renderBody(cls, domains);
                });
                dcResults.appendChild(row);
            });
        }
        dcInput.addEventListener('input', () => renderDcResults(dcInput.value));
        addWrap.append(addLbl, dcInput, dcResults);
        domSec.appendChild(addWrap);
    }

    tabPanels.domains.appendChild(domSec);

    // ── Bio tab ──
    const bioSec = document.createElement('div');
    bioSec.className = 'sheet-section';
    bioSec.innerHTML = secTitle('Background');

    // Ancestry/community display
    const bioMeta = document.createElement('div');
    bioMeta.style.cssText = 'font-size:0.82em;color:var(--ink-muted);margin-bottom:12px;line-height:1.6;';
    bioMeta.innerHTML = [
        char.ancestry  ? `<strong>Ancestry:</strong> ${char.ancestry}`  : '',
        char.community ? `<strong>Community:</strong> ${char.community}` : '',
    ].filter(Boolean).join(' &nbsp;·&nbsp; ');
    if (bioMeta.innerHTML.trim()) bioSec.appendChild(bioMeta);

    // Concept — editable input
    const conceptLbl = document.createElement('div'); conceptLbl.className = 'bio-field-label'; conceptLbl.textContent = 'Concept';
    const conceptInput = document.createElement('input');
    conceptInput.type = 'text'; conceptInput.className = 'bio-concept-input';
    conceptInput.placeholder = 'A short phrase that defines your character…';
    conceptInput.value = char.concept ?? '';
    conceptInput.addEventListener('input', () => {
        char.concept = conceptInput.value;
        const conceptEl = document.getElementById('char-concept');
        if (conceptEl) { conceptEl.textContent = char.concept ? `"${char.concept}"` : ''; conceptEl.style.display = char.concept ? '' : 'none'; }
        scheduleSave();
    });
    bioSec.append(conceptLbl, conceptInput);

    // Background Q&A — editable textareas
    const bqs = (cls || {}).backgroundQuestions || [];
    if (!char.backgroundAnswers) char.backgroundAnswers = [];
    if (bqs.length) {
        bqs.forEach((q, i) => {
            const wrap = document.createElement('div'); wrap.className = 'bio-question';
            const qEl = document.createElement('div'); qEl.className = 'bio-question-text'; qEl.textContent = `${i + 1}. ${q}`;
            const aEl = document.createElement('textarea');
            aEl.className = 'bio-edit-field';
            aEl.placeholder = 'Your answer…';
            aEl.value = char.backgroundAnswers[i] || '';
            aEl.addEventListener('input', () => {
                char.backgroundAnswers[i] = aEl.value;
                scheduleSave();
            });
            wrap.append(qEl, aEl);
            bioSec.appendChild(wrap);
        });
    }

    // Personal history field
    const histLbl = document.createElement('div'); histLbl.className = 'bio-field-label'; histLbl.textContent = 'Personal History';
    const histArea = document.createElement('textarea');
    histArea.className = 'bio-edit-field';
    histArea.style.minHeight = '80px';
    histArea.placeholder = 'Where did you come from? What shaped you?';
    histArea.value = char.sheetState.personalHistory ?? '';
    histArea.addEventListener('input', () => { char.sheetState.personalHistory = histArea.value; scheduleSave(); });
    bioSec.append(histLbl, histArea);

    tabPanels.bio.appendChild(bioSec);

    // ── Level tab ──
    const lvlSec = document.createElement('div');
    lvlSec.className = 'sheet-section';
    lvlSec.innerHTML = secTitle('Advancement Summary');
    const currentLvl = char.sheetState.level ?? 1;
    const summaryLines = [];
    if (char.sheetState.proficiency > 1) summaryLines.push(`Proficiency: ${char.sheetState.proficiency}`);
    if (char.sheetState.extraHp > 0)     summaryLines.push(`Bonus HP: +${char.sheetState.extraHp}`);
    if (char.sheetState.extraStress > 0) summaryLines.push(`Bonus Stress: +${char.sheetState.extraStress}`);
    if (char.sheetState.evasionBonus > 0) summaryLines.push(`Evasion Bonus: +${char.sheetState.evasionBonus}`);
    const tb = char.sheetState.thresholdBonus ?? {};
    if ((tb.minor ?? 0) > 0) summaryLines.push(`Minor Threshold Bonus: +${tb.minor}`);
    if ((tb.major ?? 0) > 0) summaryLines.push(`Major Threshold Bonus: +${tb.major}`);
    TRAIT_NAMES.forEach(t => {
        const b = char.sheetState.traitBonuses?.[t] ?? 0;
        if (b > 0) summaryLines.push(`${t}: +${b} bonus`);
    });
    (char.sheetState.multiclasses ?? []).forEach(mc => {
        mc.features.forEach(f => summaryLines.push(`Multiclass: ${f} (${mc.className} · ${mc.subclassName})`));
    });
    if (summaryLines.length) {
        const list = document.createElement('ul');
        list.style.cssText = 'margin:0;padding:0 0 0 18px;line-height:1.9;font-size:0.85em;color:var(--ink-muted);';
        summaryLines.forEach(s => { const li = document.createElement('li'); li.textContent = s; list.appendChild(li); });
        lvlSec.appendChild(list);
    } else {
        const none = document.createElement('p');
        none.style.cssText = 'font-size:0.85em;color:var(--ink-dim);font-style:italic;';
        none.textContent = 'No advancements yet.';
        lvlSec.appendChild(none);
    }
    tabPanels.level.appendChild(lvlSec);

    // ── Notes tab ──
    const notesSec = document.createElement('div');
    notesSec.className = 'sheet-section';
    notesSec.innerHTML = secTitle('Notes');
    const notesArea = document.createElement('textarea');
    notesArea.className = 'inventory-extra';
    notesArea.style.minHeight = '200px';
    notesArea.placeholder = 'Session notes, reminders, story threads…';
    notesArea.value = char.sheetState.extraInventory ?? char.extraInventory ?? '';
    notesArea.addEventListener('input', () => { char.sheetState.extraInventory = notesArea.value; scheduleSave(); });
    notesSec.appendChild(notesArea);
    tabPanels.notes.appendChild(notesSec);

    // Append all panels to right column
    TAB_NAMES.forEach(t => right.appendChild(tabPanels[t]));

    body.appendChild(left);
    body.appendChild(right);
}

// ── Rest Overlay ──────────────────────────────────────────────────────────────
function openRestOverlay(type) {
    const overlay = document.getElementById('rest-overlay');
    const content = document.getElementById('rest-content');
    overlay.style.display = 'flex';

    const cls = classes.find(c => c.id === char.classId) || {};
    const lvl = char.sheetState.level ?? 1;
    const tier = lvl <= 1 ? 1 : lvl <= 4 ? 2 : lvl <= 7 ? 3 : 4;
    const isLong = type === 'long';
    let movesLeft = 2;

    function roll(sides) { return Math.ceil(Math.random() * sides); }
    function rollResult() { return roll(4) + tier; }

    function close() {
        // Always unexhaust cards on rest; long rest also clears tokens
        const cs = char.sheetState.cardState || {};
        Object.keys(cs).forEach(n => {
            cs[n].exhausted = false;
            if (isLong) cs[n].tokens = 0;
        });
        scheduleSave(); renderSheet();
        overlay.style.display = 'none';
        content.innerHTML = '';
    }

    const shortMoves = [
        {
            label: 'Tend to Wounds',
            desc: `Roll 1d4+${tier} and clear that many HP (or an ally's HP).`,
            apply() {
                const rolled = rollResult();
                const before = char.sheetState.hp;
                char.sheetState.hp = Math.max(0, before - rolled);
                return `Rolled ${rolled} — cleared ${before - char.sheetState.hp} HP.`;
            }
        },
        {
            label: 'Clear Stress',
            desc: `Roll 1d4+${tier} and clear that many Stress.`,
            apply() {
                const rolled = rollResult();
                const before = char.sheetState.stress;
                char.sheetState.stress = Math.max(0, before - rolled);
                return `Rolled ${rolled} — cleared ${before - char.sheetState.stress} Stress.`;
            }
        },
        {
            label: 'Repair Armor',
            desc: `Roll 1d4+${tier} and clear that many Armor Slots (or an ally's).`,
            apply() {
                const rolled = rollResult();
                const before = char.sheetState.armor;
                char.sheetState.armor = Math.max(0, before - rolled);
                return `Rolled ${rolled} — cleared ${before - char.sheetState.armor} Armor Slot${before - char.sheetState.armor !== 1 ? 's' : ''}.`;
            }
        },
        {
            label: 'Prepare',
            desc: 'Gain 1 Hope. If preparing with one or more allies, each of you gains 2 Hope instead.',
            apply(withAllies) {
                const gain = withAllies ? 2 : 1;
                char.sheetState.hope = Math.min(6 - (char.sheetState.scars ?? 0), (char.sheetState.hope ?? 0) + gain);
                return `Gained ${gain} Hope.`;
            },
            hasAlliesOption: true,
        },
    ];

    const longMoves = [
        {
            label: 'Tend to All Wounds',
            desc: 'Clear all marked HP (or an ally\'s HP).',
            apply() { const n = char.sheetState.hp; char.sheetState.hp = 0; return `Cleared ${n} HP.`; }
        },
        {
            label: 'Clear All Stress',
            desc: 'Clear all marked Stress.',
            apply() { const n = char.sheetState.stress; char.sheetState.stress = 0; return `Cleared ${n} Stress.`; }
        },
        {
            label: 'Repair All Armor',
            desc: 'Clear all Armor Slots (or an ally\'s).',
            apply() { const n = char.sheetState.armor; char.sheetState.armor = 0; return `Cleared ${n} Armor Slot${n !== 1 ? 's' : ''}.`; }
        },
        {
            label: 'Prepare',
            desc: 'Gain 1 Hope, or 2 Hope if preparing with allies.',
            apply(withAllies) {
                const gain = withAllies ? 2 : 1;
                char.sheetState.hope = Math.min(6 - (char.sheetState.scars ?? 0), (char.sheetState.hope ?? 0) + gain);
                return `Gained ${gain} Hope.`;
            },
            hasAlliesOption: true,
        },
        {
            label: 'Work on a Project',
            desc: 'Advance a long-term crafting, research, or personal goal with GM guidance.',
            apply() { return 'Noted — describe your project to the GM.'; }
        },
    ];

    const moves = isLong ? longMoves : shortMoves;

    function render() {
        content.innerHTML = '';

        const hdr = document.createElement('div');
        hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--border-gold);';
        hdr.innerHTML = `<div>
            <div style="font-family:Cinzel,serif;font-size:1.1em;font-weight:700;color:var(--gold-mid);">${isLong ? 'Long Rest' : 'Short Rest'}</div>
            <div style="font-family:Oswald,sans-serif;font-size:0.68em;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);margin-top:2px;">Choose ${movesLeft} downtime move${movesLeft !== 1 ? 's' : ''} · GM gains ${isLong ? '1d4 + number of PCs' : '1d4'} Fear</div>
        </div>`;
        const closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.style.cssText = 'font-family:Cinzel,serif;font-size:0.72em;letter-spacing:0.06em;padding:5px 14px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:4px;';
        closeBtn.textContent = movesLeft === 2 ? 'Skip Rest' : 'Done';
        closeBtn.addEventListener('click', close);
        hdr.appendChild(closeBtn);
        content.appendChild(hdr);

        moves.forEach(move => {
            const card = document.createElement('div');
            card.style.cssText = 'border:1px solid var(--border);background:rgba(255,252,244,0.6);border-radius:4px;padding:12px 14px;margin-bottom:10px;';
            const cardHdr = document.createElement('div');
            cardHdr.style.cssText = 'display:flex;align-items:flex-start;justify-content:space-between;gap:10px;';
            const info = document.createElement('div');
            const title = document.createElement('div');
            title.style.cssText = 'font-family:Cinzel,serif;font-size:0.82em;font-weight:700;color:var(--ink);margin-bottom:3px;';
            title.textContent = move.label;
            const desc = document.createElement('div');
            desc.style.cssText = 'font-family:"EB Garamond",serif;font-size:0.88em;color:var(--ink-muted);line-height:1.4;';
            desc.textContent = move.desc;
            info.append(title, desc);

            const btnWrap = document.createElement('div');
            btnWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;flex-shrink:0;';

            function makeApplyBtn(label, withAllies) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.style.cssText = 'font-family:Cinzel,serif;font-size:0.65em;letter-spacing:0.06em;padding:5px 12px;border:1px solid var(--gold);background:var(--gold);color:#f5edd8;cursor:pointer;border-radius:3px;white-space:nowrap;';
                btn.textContent = label;
                btn.addEventListener('click', () => {
                    const msg = move.apply(withAllies);
                    movesLeft--;
                    scheduleSave();
                    // Show result feedback
                    const fb = document.createElement('div');
                    fb.style.cssText = 'font-size:0.78em;color:rgba(60,120,60,0.9);font-style:italic;margin-top:4px;font-family:"EB Garamond",serif;';
                    fb.textContent = msg;
                    info.appendChild(fb);
                    btn.disabled = true; btn.style.opacity = '0.5';
                    // Update header counter
                    hdr.querySelector('div div:last-child').textContent =
                        movesLeft > 0
                            ? `Choose ${movesLeft} more downtime move${movesLeft !== 1 ? 's' : ''} · GM gains ${isLong ? '1d4 + number of PCs' : '1d4'} Fear`
                            : 'Rest complete';
                    closeBtn.textContent = movesLeft > 0 ? 'Skip remaining' : 'Done';
                    if (movesLeft <= 0) setTimeout(close, 800);
                });
                return btn;
            }

            btnWrap.appendChild(makeApplyBtn('Take Move', false));
            if (move.hasAlliesOption) {
                btnWrap.appendChild(makeApplyBtn('With Allies', true));
            }

            cardHdr.append(info, btnWrap);
            card.appendChild(cardHdr);
            content.appendChild(card);
        });
    }

    render();
}

// ── Level-Up Page ─────────────────────────────────────────────────────────────
function openLevelUpModal() {
    const cls = classes.find(c => c.id === char.classId) || {};
    const classDomains = (CLASS_DOMAINS[char.classId] || '').split(',').filter(Boolean);
    const lvl = char.sheetState.level ?? 1;
    const newLvl = lvl + 1;
    if (newLvl > 10) { alert('Already at max level (10).'); return; }

    function getTier(l) { return l <= 1 ? 1 : l <= 4 ? 2 : l <= 7 ? 3 : 4; }
    const currentTier = getTier(lvl);
    const newTier = getTier(newLvl);
    const isTierChange = newTier > currentTier;
    const isAchievement = [2, 5, 8].includes(newLvl);
    const ss = char.sheetState;

    if (!ss.tierSlots || isTierChange) {
        ss.tierSlots = { traits: 0, hp: 0, stress: 0, evasion: 0, experiences: 0, extraDomain: 0, subclass: 0, proficiency: 0 };
    }

    const session = {
        expName: '',
        picks: [],       // advancement ids picked
        traitSels: [],   // [{t1,t2}] per 'traits' pick
        expSels: [],     // [{e1,e2}] per 'experiences' pick
        mcPick: null,    // finalized {classId,className,subclassName,featureName}
        mcPhase: null,   // 'class'|'subclass'|'feature'
        mcTmp: {},
        domainCard: null,
        extraDomainCard: null,
    };

    const overlay = document.getElementById('level-up-overlay');
    overlay.style.display = 'block';

    function close() {
        overlay.style.display = 'none';
        document.getElementById('level-up-content').innerHTML = '';
    }

    function pickCost() {
        return session.picks.reduce((s, id) => s + (id === 'proficiency' || id === 'multiclass' ? 2 : 1), 0);
    }

    // ─────────────────────────────────────────────────────────────────────────
    function render() {
        const content = document.getElementById('level-up-content');
        content.innerHTML = '';

        // Header
        const hdr = document.createElement('div');
        hdr.style.cssText = 'display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--border-gold);';
        const backBtn = document.createElement('button');
        backBtn.type = 'button';
        backBtn.style.cssText = 'font-family:Cinzel,serif;font-size:0.75em;letter-spacing:0.06em;padding:6px 14px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:5px;flex-shrink:0;';
        backBtn.textContent = '← Back to Sheet';
        backBtn.addEventListener('click', close);
        const hdrText = document.createElement('div');
        hdrText.innerHTML = `
            <div style="font-family:Cinzel,serif;font-size:1.25em;font-weight:700;color:var(--gold-mid);">Leveling Up: ${lvl} → ${newLvl}</div>
            <div style="font-family:Oswald,sans-serif;font-size:0.7em;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);margin-top:2px;">${char.name || 'Character'} · Tier ${newTier}</div>`;
        hdr.append(backBtn, hdrText);
        content.appendChild(hdr);

        function secTitle(t) {
            const d = document.createElement('div');
            d.style.cssText = 'font-family:Cinzel,serif;font-size:0.82em;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold-mid);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(180,140,60,0.3);';
            d.textContent = t; return d;
        }
        function autoRow(label, desc) {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;gap:10px;margin-bottom:8px;';
            row.innerHTML = `<span style="color:var(--gold);flex-shrink:0;margin-top:1px;">✓</span><div><div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);">${label}</div><div style="font-size:0.77em;color:var(--ink-dim);margin-top:2px;line-height:1.4;">${desc}</div></div>`;
            return row;
        }

        // ── Section 1: Always-applied ──────────────────────────────────────
        const autoSec = document.createElement('div');
        autoSec.style.cssText = 'margin-bottom:28px;';
        autoSec.appendChild(secTitle('Always Applied at Level-Up'));
        const armor = char.armor;
        if (armor) {
            const minor = (armor.minorThreshold ?? 0) + newLvl;
            const major = (armor.majorThreshold ?? 0) + newLvl;
            autoSec.appendChild(autoRow('Damage Thresholds +1', `Thresholds always equal armor base + level. At level ${newLvl}: Minor ${minor} · Major ${major} · Severe ${major * 2}`));
        } else {
            autoSec.appendChild(autoRow('Damage Thresholds +1', 'Equip armor to see threshold values (armor base + your level).'));
        }
        autoSec.appendChild(autoRow('Domain Card', 'Choose one new domain card of your level or lower (see bottom of this page).'));
        content.appendChild(autoSec);

        // ── Section 2: Level Achievement (auto at 2/5/8) ──────────────────
        if (isAchievement) {
            const achSec = document.createElement('div');
            achSec.style.cssText = 'margin-bottom:28px;';
            achSec.appendChild(secTitle(`Level ${newLvl} Achievement — Automatic Bonuses`));
            const achNote = document.createElement('p');
            achNote.style.cssText = 'font-size:0.8em;color:var(--ink-muted);margin:0 0 12px;line-height:1.5;';
            achNote.textContent = 'These bonuses are applied automatically when you confirm. They do not use advancement picks.';
            achSec.appendChild(achNote);
            achSec.appendChild(autoRow('+1 Proficiency (permanent)', `Proficiency increases from ${ss.proficiency ?? 1} to ${(ss.proficiency ?? 1) + 1}. Your weapons roll one additional die of damage.`));
            if (newLvl === 5 || newLvl === 8) {
                achSec.appendChild(autoRow('All Trait Marks Cleared', 'All previously marked traits are unmarked. You may increase those traits again during this tier.'));
            }
            // Experience name input
            const expWrap = document.createElement('div');
            expWrap.style.cssText = 'display:flex;gap:10px;align-items:flex-start;';
            expWrap.innerHTML = `<span style="color:var(--gold);flex-shrink:0;margin-top:10px;">✓</span>`;
            const expBody = document.createElement('div'); expBody.style.cssText = 'flex:1;';
            expBody.innerHTML = `<div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);margin-bottom:4px;">+1 New Experience (modifier +2)</div><div style="font-size:0.77em;color:var(--ink-dim);margin-bottom:6px;line-height:1.4;">Name a new Experience reflecting your character's growth. It starts with a +2 modifier and can be spent like any other Experience.</div>`;
            const expInput = document.createElement('input');
            expInput.type = 'text'; expInput.value = session.expName;
            expInput.placeholder = 'e.g. "Always Land on My Feet"';
            expInput.style.cssText = 'width:100%;padding:7px 9px;border:1px solid var(--border-gold);border-radius:4px;font-size:0.82em;background:rgba(255,255,255,0.7);color:var(--ink);box-sizing:border-box;';
            expInput.addEventListener('input', () => { session.expName = expInput.value; });
            expBody.appendChild(expInput);
            expWrap.appendChild(expBody);
            achSec.appendChild(expWrap);
            content.appendChild(achSec);
        }

        // ── Section 3: Advancements ────────────────────────────────────────
        const advSec = document.createElement('div');
        advSec.style.cssText = 'margin-bottom:28px;';
        advSec.appendChild(secTitle('Choose 2 Advancements'));
        const cost = pickCost();
        const counter = document.createElement('div');
        counter.style.cssText = `font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:${cost >= 2 ? 'var(--gold-mid)' : 'var(--ink-dim)'};margin-bottom:14px;`;
        counter.textContent = `Picks used: ${cost} / 2  ${cost >= 2 ? '✓' : ''}`;
        advSec.appendChild(counter);

        const advNote = document.createElement('p');
        advNote.style.cssText = 'font-size:0.78em;color:var(--ink-dim);margin:0 0 14px;line-height:1.5;';
        advNote.textContent = newTier >= 3
            ? `Tier ${newTier}: you may choose from all options below, including options from previous tiers. Proficiency and Multiclass each cost both picks.`
            : `Tier 2: choose any two options from the list. Some options can be taken multiple times per tier (up to the slot limit).`;
        advSec.appendChild(advNote);

        const unmarkedTraits = TRAIT_NAMES.filter(t => !ss.traitMarks?.[t]);
        const hasSubclass = !!(cls.subclasses || []).find(s => s.name === char.subclassName);
        const hasMulticlassed = (ss.multiclasses || []).length > 0;
        const subclassPickedNow = session.picks.includes('subclass');
        const mcPickedNow = session.picks.includes('multiclass');

        const OPTS = [
            {
                id: 'traits',
                label: '+1 to Two Character Traits',
                desc: `Choose any two unmarked traits and gain a permanent +1 bonus to each. Mark them — marked traits cannot be increased again until marks clear at level 5 or 8. ${unmarkedTraits.length} unmarked: ${unmarkedTraits.join(', ') || 'none'}.`,
                usedNow: ss.tierSlots.traits + session.picks.filter(p => p === 'traits').length,
                max: 3,
                disabled: unmarkedTraits.length < 2,
                disabledMsg: 'Fewer than 2 unmarked traits',
                costsBoth: false,
            },
            {
                id: 'hp',
                label: '+1 Hit Point Slot',
                desc: `Permanently gain one additional HP slot. Max HP increases from ${(cls.startingHp ?? 6) + (ss.extraHp ?? 0)} to ${(cls.startingHp ?? 6) + (ss.extraHp ?? 0) + session.picks.filter(p=>p==='hp').length + 1}.`,
                usedNow: ss.tierSlots.hp + session.picks.filter(p => p === 'hp').length,
                max: 2, costsBoth: false,
            },
            {
                id: 'stress',
                label: '+1 Stress Slot',
                desc: `Permanently gain one additional Stress slot. Max Stress increases from ${6 + (ss.extraStress ?? 0)} to ${6 + (ss.extraStress ?? 0) + session.picks.filter(p=>p==='stress').length + 1}.`,
                usedNow: ss.tierSlots.stress + session.picks.filter(p => p === 'stress').length,
                max: 2, costsBoth: false,
            },
            {
                id: 'experiences',
                label: '+1 to Two Experiences',
                desc: `Choose two of your existing Experiences and permanently increase each modifier by +1. You have ${(ss.experiences || []).length} experience${(ss.experiences||[]).length!==1?'s':''}.`,
                usedNow: ss.tierSlots.experiences + session.picks.filter(p => p === 'experiences').length,
                max: 2,
                disabled: (ss.experiences || []).length < 2,
                disabledMsg: 'Need at least 2 experiences on sheet',
                costsBoth: false,
            },
            {
                id: 'extraDomain',
                label: 'Additional Domain Card',
                desc: `Choose one extra domain card of your level or lower from a domain you have access to. This is in addition to the card you always gain at level-up.`,
                usedNow: ss.tierSlots.extraDomain + session.picks.filter(p => p === 'extraDomain').length,
                max: 1, costsBoth: false,
            },
            {
                id: 'evasion',
                label: '+1 Evasion',
                desc: `Permanently gain a +1 bonus to your Evasion. Your Evasion increases from ${(cls.startingEvasion ?? 0) + (ss.evasionBonus ?? 0)} to ${(cls.startingEvasion ?? 0) + (ss.evasionBonus ?? 0) + session.picks.filter(p=>p==='evasion').length + 1}.`,
                usedNow: ss.tierSlots.evasion + session.picks.filter(p => p === 'evasion').length,
                max: 1, costsBoth: false,
            },
        ];

        if (newTier >= 3) {
            OPTS.push({
                id: 'subclass',
                label: `Upgraded Subclass Card (${newTier === 3 ? 'Specialization' : 'Mastery'})`,
                desc: `Take the next card for your subclass — ${newTier === 3 ? 'a Specialization feature' : 'a Mastery feature'}. Choosing this crosses out Multiclass for this tier (they are mutually exclusive). Requires a subclass.`,
                usedNow: ss.tierSlots.subclass + (subclassPickedNow ? 1 : 0),
                max: 1,
                disabled: !hasSubclass || mcPickedNow || ss.tierSlots.subclass > 0,
                disabledMsg: !hasSubclass ? 'No subclass selected' : mcPickedNow ? 'Multiclass already chosen this tier' : 'Already used this tier',
                costsBoth: false,
            });
            OPTS.push({
                id: 'proficiency',
                label: '+1 Proficiency  [costs both picks]',
                desc: `Increase Proficiency by +1, adding one die to all your weapon damage rolls (e.g. 2d8 → 3d8). Using this option fills both advancement slots for this level.`,
                usedNow: ss.tierSlots.proficiency + (session.picks.includes('proficiency') ? 1 : 0),
                max: 1,
                disabled: ss.tierSlots.proficiency > 0,
                disabledMsg: 'Already used this tier',
                costsBoth: true,
            });
            OPTS.push({
                id: 'multiclass',
                label: 'Multiclass  [costs both picks, once total]',
                desc: `Choose a second class. Select one of its domains and gain a foundation card from a subclass of your choice. Domain cards from your new class are limited to half your level (rounded up). You can only multiclass once ever. Crosses out Subclass upgrade for this tier.`,
                usedNow: hasMulticlassed ? 1 : 0,
                max: 1,
                disabled: hasMulticlassed || subclassPickedNow,
                disabledMsg: hasMulticlassed ? 'Already multiclassed (once per character)' : 'Subclass upgrade already chosen this tier',
                costsBoth: true,
            });
        }

        OPTS.forEach(opt => {
            const timesPickedNow = session.picks.filter(p => p === opt.id).length;
            const isSelected = timesPickedNow > 0;
            const slotsLeft = opt.max - opt.usedNow;
            const wouldExceed = opt.costsBoth ? cost > 0 : cost + 1 > 2;
            const canPick = !opt.disabled && slotsLeft > 0 && !wouldExceed;
            const canDeselect = isSelected;
            const greyedOut = (opt.disabled || slotsLeft <= 0 || wouldExceed) && !isSelected;

            const card = document.createElement('div');
            card.style.cssText = `border:2px solid ${isSelected ? 'var(--gold)' : 'var(--border)'};border-radius:8px;padding:12px 14px;margin-bottom:8px;background:${isSelected ? 'rgba(180,140,60,0.1)' : 'transparent'};opacity:${greyedOut ? '0.42' : '1'};cursor:${canPick || canDeselect ? 'pointer' : 'default'};transition:border-color 0.12s,background 0.12s;`;

            let slotTag = '';
            if (slotsLeft <= 0) slotTag = `<span style="font-size:0.65em;font-family:Oswald,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:rgba(180,60,60,0.8);margin-left:8px;">FULL THIS TIER</span>`;
            else if (opt.max > 1) slotTag = `<span style="font-size:0.65em;font-family:Oswald,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-dim);margin-left:8px;">${opt.usedNow}/${opt.max} used</span>`;
            else if (opt.costsBoth) slotTag = `<span style="font-size:0.65em;font-family:Oswald,sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-dim);margin-left:8px;">BOTH PICKS</span>`;

            card.innerHTML = `
                <div style="display:flex;align-items:baseline;margin-bottom:5px;">
                    <div style="font-family:Cinzel,serif;font-size:0.83em;font-weight:700;color:var(--ink);">${opt.label}${isSelected ? ' ✓' : ''}</div>
                    ${slotTag}
                </div>
                <div style="font-size:0.78em;color:var(--ink-dim);line-height:1.45;">${opt.desc}</div>
                ${opt.disabled && opt.disabledMsg && !isSelected ? `<div style="font-size:0.72em;color:rgba(160,60,60,0.8);margin-top:5px;font-style:italic;">${opt.disabledMsg}</div>` : ''}`;

            if (canPick || canDeselect) {
                card.addEventListener('click', () => {
                    const idx = session.picks.indexOf(opt.id);
                    if (idx >= 0) {
                        session.picks.splice(idx, 1);
                        if (opt.id === 'traits') session.traitSels.pop();
                        if (opt.id === 'experiences') session.expSels.pop();
                        if (opt.id === 'multiclass') { session.mcPick = null; session.mcPhase = null; session.mcTmp = {}; }
                        if (opt.id === 'extraDomain') { session.extraDomainCard = null; }
                    } else {
                        if (opt.costsBoth && cost > 0) return;
                        if (!opt.costsBoth && cost >= 2) return;
                        session.picks.push(opt.id);
                        if (opt.id === 'traits') session.traitSels.push({ t1: null, t2: null });
                        if (opt.id === 'experiences') session.expSels.push({ e1: null, e2: null });
                        if (opt.id === 'multiclass') session.mcPhase = 'class';
                    }
                    render();
                });
            }
            advSec.appendChild(card);

            // Inline sub-pickers
            if (isSelected && opt.id === 'traits') {
                session.traitSels.forEach((sel, si) => advSec.appendChild(buildTraitPicker(sel, si)));
            }
            if (isSelected && opt.id === 'experiences') {
                session.expSels.forEach((sel, si) => advSec.appendChild(buildExpPicker(sel, si)));
            }
            if (isSelected && opt.id === 'multiclass') {
                advSec.appendChild(buildMcPicker());
            }
        });

        content.appendChild(advSec);

        // ── Section 4: Domain Card(s) ──────────────────────────────────────
        const hasExtraDomain = session.picks.includes('extraDomain');
        const dcSec = document.createElement('div');
        dcSec.style.cssText = 'margin-bottom:28px;';
        dcSec.appendChild(secTitle(hasExtraDomain ? 'Choose Your Domain Cards (×2)' : 'Choose Your Domain Card'));
        const dcNote = document.createElement('p');
        dcNote.style.cssText = 'font-size:0.8em;color:var(--ink-muted);margin:0 0 12px;line-height:1.5;';
        dcNote.textContent = `Choose one domain card at your level (${newLvl}) or lower from a domain you have access to${hasExtraDomain ? ' — plus a second card from the Additional Domain Card advancement' : ''}. Multiclassed secondary domains are limited to level ${Math.ceil(newLvl / 2)} or lower.`;
        dcSec.appendChild(dcNote);
        buildDomainBrowser(dcSec, 'domainCard', 'Card 1 — Mandatory');
        if (hasExtraDomain) {
            const sep = document.createElement('div');
            sep.style.cssText = 'margin:14px 0 10px;font-family:Oswald,sans-serif;font-size:0.7em;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-mid);';
            sep.textContent = 'Card 2 — Additional Domain Card advancement';
            dcSec.appendChild(sep);
            buildDomainBrowser(dcSec, 'extraDomainCard', 'Card 2 — Additional');
        }
        content.appendChild(dcSec);

        // ── Confirm ────────────────────────────────────────────────────────
        const confirmBtn = document.createElement('button');
        confirmBtn.type = 'button';
        confirmBtn.style.cssText = 'display:block;width:100%;padding:14px;font-family:Cinzel,serif;font-size:0.95em;font-weight:700;letter-spacing:0.1em;background:var(--gold);color:#f5edd8;border:none;border-radius:8px;cursor:pointer;transition:opacity 0.12s;';
        confirmBtn.textContent = `Confirm — Level ${lvl} → ${newLvl}`;
        confirmBtn.addEventListener('click', applyLevelUp);
        content.appendChild(confirmBtn);
    }

    // ── Trait Picker ─────────────────────────────────────────────────────────
    function buildTraitPicker(sel, idx) {
        const usedElsewhere = new Set(
            session.traitSels.flatMap((s, i) => i === idx ? [] : [s.t1, s.t2]).filter(Boolean)
        );
        const wrap = document.createElement('div');
        wrap.style.cssText = 'margin:-4px 0 8px 16px;padding:10px 12px;background:rgba(180,140,60,0.06);border:1px dashed rgba(180,140,60,0.4);border-radius:6px;';
        wrap.innerHTML = `<div style="font-size:0.7em;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;">Trait Pick ${idx + 1} — choose 2 unmarked traits to increase</div>`;
        const row = document.createElement('div'); row.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
        TRAIT_NAMES.forEach(t => {
            const isMarked = !!ss.traitMarks?.[t];
            const isSel = sel.t1 === t || sel.t2 === t;
            const unavail = isMarked || usedElsewhere.has(t);
            const base = (parseFloat(char.traits?.[t]) || 0) + (ss.traitBonuses?.[t] ?? 0);
            const btn = document.createElement('button'); btn.type = 'button';
            btn.style.cssText = `font-family:Cinzel,serif;font-size:0.75em;padding:5px 11px;border-radius:4px;border:2px solid ${isSel ? 'var(--gold)' : 'var(--border)'};background:${isSel ? 'rgba(180,140,60,0.2)' : 'transparent'};color:var(--ink);cursor:${unavail && !isSel ? 'default' : 'pointer'};opacity:${unavail && !isSel ? '0.35' : '1'};`;
            btn.innerHTML = `${t} <span style="color:var(--gold-mid);">${base >= 0 ? '+' : ''}${base}→+${base+1}</span>${isMarked ? ' <span style="font-size:0.7em;color:rgba(160,60,60,0.7);">(marked)</span>' : ''}`;
            if (!unavail || isSel) {
                btn.addEventListener('click', () => {
                    if (isSel) { if (sel.t1 === t) sel.t1 = null; else sel.t2 = null; }
                    else if (!sel.t1) sel.t1 = t;
                    else if (!sel.t2) sel.t2 = t;
                    render();
                });
            }
            row.appendChild(btn);
        });
        wrap.appendChild(row);
        return wrap;
    }

    // ── Experience Picker ─────────────────────────────────────────────────────
    function buildExpPicker(sel, idx) {
        const exps = ss.experiences || [];
        const usedElsewhere = new Set(
            session.expSels.flatMap((s, i) => i === idx ? [] : [s.e1, s.e2]).filter(v => v != null)
        );
        const wrap = document.createElement('div');
        wrap.style.cssText = 'margin:-4px 0 8px 16px;padding:10px 12px;background:rgba(180,140,60,0.06);border:1px dashed rgba(180,140,60,0.4);border-radius:6px;';
        wrap.innerHTML = `<div style="font-size:0.7em;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;">Experience Pick ${idx + 1} — choose 2 experiences to boost by +1</div>`;
        const col = document.createElement('div'); col.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
        exps.forEach((exp, ei) => {
            const isSel = sel.e1 === ei || sel.e2 === ei;
            const gone = usedElsewhere.has(ei);
            const btn = document.createElement('button'); btn.type = 'button';
            btn.style.cssText = `text-align:left;padding:5px 10px;border-radius:4px;border:2px solid ${isSel ? 'var(--gold)' : 'var(--border)'};background:${isSel ? 'rgba(180,140,60,0.15)' : 'transparent'};cursor:${gone && !isSel ? 'default' : 'pointer'};opacity:${gone && !isSel ? '0.35' : '1'};`;
            btn.innerHTML = `<span style="font-family:Cinzel,serif;font-size:0.8em;color:var(--ink);">${exp.name}</span> <span style="color:var(--gold-mid);font-size:0.75em;">+${exp.modifier} → +${exp.modifier + 1}</span>`;
            if (!gone || isSel) {
                btn.addEventListener('click', () => {
                    if (isSel) { if (sel.e1 === ei) sel.e1 = null; else sel.e2 = null; }
                    else if (sel.e1 == null) sel.e1 = ei;
                    else if (sel.e2 == null) sel.e2 = ei;
                    render();
                });
            }
            col.appendChild(btn);
        });
        wrap.appendChild(col);
        return wrap;
    }

    // ── Multiclass Sub-picker ─────────────────────────────────────────────────
    function buildMcPicker() {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'margin:-4px 0 8px 16px;padding:12px 14px;background:rgba(180,140,60,0.06);border:1px dashed rgba(180,140,60,0.4);border-radius:6px;';
        const lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:0.7em;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px;';

        if (!session.mcPhase || session.mcPhase === 'class') {
            lbl.textContent = 'Step 1 of 3 — Choose a Secondary Class';
            wrap.appendChild(lbl);
            const grid = document.createElement('div'); grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;';
            classes.filter(c => c.id !== char.classId).forEach(c => {
                const sel = session.mcTmp.classId === c.id;
                const btn = document.createElement('button'); btn.type = 'button';
                btn.style.cssText = `text-align:left;padding:8px 12px;border-radius:6px;border:2px solid ${sel ? 'var(--gold)' : 'var(--border)'};background:${sel ? 'rgba(180,140,60,0.15)' : 'transparent'};cursor:pointer;`;
                btn.innerHTML = `<div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);">${c.name}</div>`;
                btn.addEventListener('click', () => { session.mcTmp = { classId: c.id, className: c.name }; render(); });
                grid.appendChild(btn);
            });
            wrap.appendChild(grid);
            if (session.mcTmp.classId) {
                const next = document.createElement('button'); next.type = 'button';
                next.style.cssText = 'font-family:Cinzel,serif;font-size:0.75em;padding:5px 14px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:4px;';
                next.textContent = 'Next: Choose Subclass →';
                next.addEventListener('click', () => { session.mcPhase = 'subclass'; render(); });
                wrap.appendChild(next);
            }

        } else if (session.mcPhase === 'subclass') {
            lbl.textContent = `Step 2 of 3 — ${session.mcTmp.className}: Choose Subclass`;
            wrap.appendChild(lbl);
            const mcCls = classes.find(c => c.id === session.mcTmp.classId) || {};
            const col = document.createElement('div'); col.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:10px;';
            (mcCls.subclasses || []).forEach(sub => {
                const sel = session.mcTmp.subclassName === sub.name;
                const btn = document.createElement('button'); btn.type = 'button';
                btn.style.cssText = `text-align:left;padding:8px 12px;border-radius:6px;border:2px solid ${sel ? 'var(--gold)' : 'var(--border)'};background:${sel ? 'rgba(180,140,60,0.15)' : 'transparent'};cursor:pointer;`;
                const sd = sub.description ? sub.description.slice(0, 80) + (sub.description.length > 80 ? '…' : '') : '';
                btn.innerHTML = `<div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);">${sub.name}</div>${sd ? `<div style="font-size:0.7em;color:var(--ink-dim);margin-top:2px;">${sd}</div>` : ''}`;
                btn.addEventListener('click', () => { session.mcTmp = { ...session.mcTmp, subclassName: sub.name, featureName: null }; render(); });
                col.appendChild(btn);
            });
            wrap.appendChild(col);
            const nav = document.createElement('div'); nav.style.cssText = 'display:flex;gap:6px;';
            const back = document.createElement('button'); back.type = 'button'; back.style.cssText = 'font-family:Cinzel,serif;font-size:0.75em;padding:5px 12px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:4px;'; back.textContent = '← Back'; back.addEventListener('click', () => { session.mcPhase = 'class'; render(); }); nav.appendChild(back);
            if (session.mcTmp.subclassName) {
                const next = document.createElement('button'); next.type = 'button'; next.style.cssText = 'font-family:Cinzel,serif;font-size:0.75em;padding:5px 14px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:4px;'; next.textContent = 'Next: Choose Feature →'; next.addEventListener('click', () => { session.mcPhase = 'feature'; render(); }); nav.appendChild(next);
            }
            wrap.appendChild(nav);

        } else if (session.mcPhase === 'feature') {
            lbl.textContent = `Step 3 of 3 — ${session.mcTmp.subclassName}: Choose Foundation Feature`;
            wrap.appendChild(lbl);
            const mcCls = classes.find(c => c.id === session.mcTmp.classId) || {};
            const mcSub = (mcCls.subclasses || []).find(s => s.name === session.mcTmp.subclassName);
            const feats = mcSub?.features?.foundation || [];
            const col = document.createElement('div'); col.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:10px;';
            if (!feats.length) { const none = document.createElement('p'); none.style.cssText = 'font-size:0.82em;color:var(--ink-dim);'; none.textContent = 'No foundation features found.'; col.appendChild(none); }
            feats.forEach(f => {
                const fname = typeof f === 'string' ? f : f.name;
                const fdesc = typeof f === 'string' ? '' : (f.description || '');
                const sel = session.mcTmp.featureName === fname;
                const btn = document.createElement('button'); btn.type = 'button';
                btn.style.cssText = `text-align:left;padding:8px 12px;border-radius:6px;border:2px solid ${sel ? 'var(--gold)' : 'var(--border)'};background:${sel ? 'rgba(180,140,60,0.15)' : 'transparent'};cursor:pointer;`;
                const sd = fdesc ? fdesc.slice(0, 100) + (fdesc.length > 100 ? '…' : '') : '';
                btn.innerHTML = `<div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);">${fname}</div>${sd ? `<div style="font-size:0.7em;color:var(--ink-dim);margin-top:2px;line-height:1.3;">${sd}</div>` : ''}`;
                btn.addEventListener('click', () => { session.mcTmp = { ...session.mcTmp, featureName: fname }; session.mcPick = { ...session.mcTmp }; render(); });
                col.appendChild(btn);
            });
            wrap.appendChild(col);
            const back = document.createElement('button'); back.type = 'button'; back.style.cssText = 'font-family:Cinzel,serif;font-size:0.75em;padding:5px 12px;border:1px solid var(--border-gold);background:transparent;color:var(--gold-mid);cursor:pointer;border-radius:4px;'; back.textContent = '← Back'; back.addEventListener('click', () => { session.mcPhase = 'subclass'; render(); }); wrap.appendChild(back);
        }

        if (session.mcPick?.featureName) {
            const summ = document.createElement('div');
            summ.style.cssText = 'margin-top:10px;padding:7px 10px;background:rgba(180,140,60,0.12);border:1px solid rgba(180,140,60,0.35);border-radius:4px;font-size:0.8em;color:var(--gold-mid);font-family:Cinzel,serif;';
            summ.textContent = `Selected: ${session.mcPick.featureName} (${session.mcPick.subclassName} · ${session.mcPick.className})`;
            wrap.appendChild(summ);
        }
        return wrap;
    }

    // ── Domain Card Browser ───────────────────────────────────────────────────
    function buildDomainBrowser(parent, slotKey, label) {
        const mcDomains = (ss.multiclasses || []).flatMap(m => (CLASS_DOMAINS[m.classId] || '').split(',').filter(Boolean));
        const allCharDomains = [...new Set([...classDomains, ...mcDomains])];
        const allOwned = [...(char.domainCards || []), ...(ss.learnedCards || [])];
        // Exclude the card chosen in the other slot
        const otherSlot = slotKey === 'domainCard' ? session.extraDomainCard : session.domainCard;
        const available = domainCards.filter(c => !allOwned.includes(c.name) && c.name !== otherSlot);

        const selDisplay = document.createElement('div');
        selDisplay.style.cssText = 'font-size:0.8em;font-family:Cinzel,serif;padding:7px 10px;border-radius:4px;background:rgba(180,140,60,0.1);color:var(--gold-mid);border:1px solid rgba(180,140,60,0.3);margin-bottom:10px;';
        selDisplay.textContent = session[slotKey] ? `Selected: ${session[slotKey]}` : 'No card selected yet';
        parent.appendChild(selDisplay);

        const TAB_DOMAINS = [...allCharDomains, 'All'];
        let activeDomain = allCharDomains[0] || 'All';
        let q = '';

        const tabBar = document.createElement('div'); tabBar.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;';
        const searchEl = document.createElement('input'); searchEl.type = 'text'; searchEl.placeholder = 'Filter by name or description…';
        searchEl.style.cssText = 'width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:4px;font-size:0.78em;background:#fff;color:var(--ink);margin-bottom:6px;box-sizing:border-box;';
        const listEl = document.createElement('div'); listEl.style.cssText = 'max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,0.5);';

        function buildTabs() {
            tabBar.innerHTML = '';
            TAB_DOMAINS.forEach(d => {
                const active = d === activeDomain;
                const t = document.createElement('button'); t.type = 'button';
                t.style.cssText = `font-family:Cinzel,serif;font-size:0.68em;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid ${active ? 'var(--gold)' : 'var(--border)'};background:${active ? 'var(--gold)' : 'transparent'};color:${active ? '#f5edd8' : 'var(--ink-dim)'};cursor:pointer;`;
                t.textContent = d;
                t.addEventListener('click', () => { activeDomain = d; buildTabs(); buildList(); });
                tabBar.appendChild(t);
            });
        }
        function buildList() {
            listEl.innerHTML = '';
            const ql = q.toLowerCase();
            const pool = available.filter(c => {
                const domMatch = activeDomain === 'All' || c.domain.toLowerCase() === activeDomain.toLowerCase();
                const qMatch = !ql || c.name.toLowerCase().includes(ql) || (c.domain||'').toLowerCase().includes(ql) || (c.description||'').toLowerCase().includes(ql);
                return domMatch && qMatch && Number(c.level) <= newLvl;
            });
            if (!pool.length) {
                const none = document.createElement('div'); none.style.cssText = 'padding:12px;font-size:0.8em;color:var(--ink-dim);font-style:italic;text-align:center;';
                none.textContent = ql ? 'No matching cards.' : 'No cards available in this domain at your level.';
                listEl.appendChild(none); return;
            }
            const byLevel = {};
            pool.forEach(c => { (byLevel[c.level] = byLevel[c.level] || []).push(c); });
            Object.keys(byLevel).sort((a, b) => Number(b) - Number(a)).forEach(lk => {
                const hdr = document.createElement('div'); hdr.style.cssText = 'padding:4px 10px 3px;font-family:Oswald,sans-serif;font-size:0.63em;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);background:rgba(0,0,0,0.04);border-bottom:1px solid var(--border);'; hdr.textContent = `Level ${lk}`; listEl.appendChild(hdr);
                byLevel[lk].forEach(c => {
                    const sel = c.name === session[slotKey];
                    const row = document.createElement('div');
                    row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04);background:${sel ? 'rgba(180,140,60,0.15)' : 'transparent'};`;
                    row.innerHTML = `<div><div style="font-family:Cinzel,serif;font-size:0.8em;font-weight:700;color:var(--ink);">${c.name}${sel ? ' ✓' : ''}</div>${c.description ? `<div style="font-size:0.7em;color:var(--ink-dim);margin-top:1px;line-height:1.3;">${c.description.slice(0,90)}${c.description.length>90?'…':''}</div>` : ''}</div><span style="font-size:0.63em;font-family:Oswald,sans-serif;letter-spacing:0.08em;color:var(--ink-dim);flex-shrink:0;margin-left:8px;text-transform:uppercase;">${c.type||''}</span>`;
                    row.addEventListener('mouseenter', () => { if (!sel) row.style.background = 'rgba(180,140,60,0.07)'; });
                    row.addEventListener('mouseleave', () => { if (!sel) row.style.background = 'transparent'; });
                    row.addEventListener('click', () => { session[slotKey] = c.name; selDisplay.textContent = `Selected: ${c.name}`; buildList(); });
                    listEl.appendChild(row);
                });
            });
        }
        searchEl.addEventListener('input', () => { q = searchEl.value; buildList(); });
        buildTabs(); buildList();
        parent.append(tabBar, searchEl, listEl);
    }

    // ── Apply ─────────────────────────────────────────────────────────────────
    function applyLevelUp() {
        if (pickCost() < 2) { alert('Choose 2 advancements before confirming.'); return; }
        if (isAchievement && !session.expName.trim()) { alert('Enter a name for your new Experience.'); return; }
        if (!session.domainCard) { alert('Choose a domain card before confirming.'); return; }
        if (session.picks.includes('extraDomain') && !session.extraDomainCard) { alert('Choose a second domain card for the Additional Domain Card advancement.'); return; }
        for (const sel of session.traitSels) {
            if (!sel.t1 || !sel.t2) { alert('Select both traits for the Traits advancement.'); return; }
        }
        for (const sel of session.expSels) {
            if (sel.e1 == null || sel.e2 == null) { alert('Select both experiences for the Experiences advancement.'); return; }
        }
        if (session.picks.includes('multiclass') && !session.mcPick?.featureName) { alert('Complete the Multiclass selection.'); return; }

        ss.level = newLvl;

        // Level achievements (auto)
        if (isAchievement) {
            ss.proficiency = (ss.proficiency ?? 1) + 1;
            ss.experiences = [...(ss.experiences || []), { name: session.expName.trim(), modifier: 2 }];
            if (newLvl === 5 || newLvl === 8) ss.traitMarks = {};
        }

        // Reset tier slots on tier change
        if (isTierChange) {
            ss.tierSlots = { traits: 0, hp: 0, stress: 0, evasion: 0, experiences: 0, extraDomain: 0, subclass: 0, proficiency: 0 };
        }

        const traitQ = [...session.traitSels];
        const expQ   = [...session.expSels];
        session.picks.forEach(id => {
            if (id === 'traits') {
                const s = traitQ.shift();
                if (s) { [s.t1, s.t2].filter(Boolean).forEach(t => { ss.traitBonuses[t] = (ss.traitBonuses[t] ?? 0) + 1; ss.traitMarks[t] = true; }); }
                ss.tierSlots.traits++;
            } else if (id === 'hp')       { ss.extraHp      = (ss.extraHp      ?? 0) + 1; ss.tierSlots.hp++; }
            else if (id === 'stress')     { ss.extraStress  = (ss.extraStress  ?? 0) + 1; ss.tierSlots.stress++; }
            else if (id === 'evasion')    { ss.evasionBonus = (ss.evasionBonus ?? 0) + 1; ss.tierSlots.evasion++; }
            else if (id === 'experiences') {
                const s = expQ.shift();
                if (s && ss.experiences) {
                    [s.e1, s.e2].filter(v => v != null).forEach(ei => {
                        if (ss.experiences[ei]) ss.experiences[ei] = { ...ss.experiences[ei], modifier: ss.experiences[ei].modifier + 1 };
                    });
                }
                ss.tierSlots.experiences++;
            }
            else if (id === 'extraDomain') { ss.tierSlots.extraDomain++; }
            else if (id === 'subclass')    { ss.tierSlots.subclass++; }
            else if (id === 'proficiency') { ss.proficiency = (ss.proficiency ?? 1) + 1; ss.tierSlots.proficiency++; }
            else if (id === 'multiclass' && session.mcPick) {
                if (!ss.multiclasses) ss.multiclasses = [];
                let entry = ss.multiclasses.find(m => m.classId === session.mcPick.classId && m.subclassName === session.mcPick.subclassName);
                if (!entry) { entry = { classId: session.mcPick.classId, className: session.mcPick.className, subclassName: session.mcPick.subclassName, features: [] }; ss.multiclasses.push(entry); }
                if (!entry.features.includes(session.mcPick.featureName)) entry.features.push(session.mcPick.featureName);
            }
        });

        // Domain cards
        if (!ss.learnedCards) ss.learnedCards = [];
        const cardsToAdd = [session.domainCard, session.extraDomainCard].filter(Boolean);
        cardsToAdd.forEach(name => {
            const owned = [...(char.domainCards || []), ...ss.learnedCards];
            if (!owned.includes(name)) ss.learnedCards.push(name);
        });

        scheduleSave();
        close();
        renderSheet();
    }

    render();
}

</script>
