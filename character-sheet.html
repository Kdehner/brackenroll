<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet — The Verdant Curse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>

        /* ── Character Banner ────────────────────── */
        .char-banner {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 24px;
            background: #1e1a14;
            padding: 28px 32px 24px;
            border-bottom: 2px solid var(--border-gold);
        }
        .char-banner-name {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            font-weight: 700;
            color: #f5edd8;
            line-height: 1.05;
            margin-bottom: 6px;
        }
        .char-banner-sub {
            font-family: 'EB Garamond', serif;
            font-size: 1em;
            color: rgba(245,237,216,0.6);
            margin-bottom: 3px;
            letter-spacing: 0.02em;
        }
        .char-banner-class {
            font-family: 'Cinzel', serif;
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold-mid);
            margin-bottom: 10px;
        }
        .char-banner-concept {
            font-family: 'EB Garamond', serif;
            font-size: 0.95em;
            font-style: italic;
            color: rgba(245,237,216,0.45);
            line-height: 1.5;
        }
        .char-banner-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        .char-banner-pronouns {
            font-family: 'EB Garamond', serif;
            font-size: 0.95em;
            font-style: italic;
            color: rgba(245,237,216,0.55);
        }
        .char-banner-domains {
            font-family: 'Cinzel', serif;
            font-size: 0.68em;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold-mid);
        }
        .char-banner-level {
            font-family: 'Oswald', sans-serif;
            font-size: 0.72em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(245,237,216,0.35);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-up-btn {
            font-family: 'Cinzel', serif;
            font-size: 0.8em;
            letter-spacing: 0.06em;
            padding: 3px 9px;
            border: 1px solid rgba(180,140,60,0.5);
            background: transparent;
            color: rgba(245,237,216,0.55);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .level-up-btn:hover {
            background: rgba(180,140,60,0.2);
            color: var(--gold);
            border-color: var(--gold);
        }
        .char-banner-rest {
            display: flex;
            gap: 6px;
        }
        .rest-btn {
            font-family: 'Cinzel', serif;
            font-size: 0.62em;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 3px 10px;
            border: 1px solid rgba(245,237,216,0.2);
            background: transparent;
            color: rgba(245,237,216,0.45);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .rest-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(180,140,60,0.15);
        }
        .save-indicator {
            font-size: 0.65em;
            color: rgba(245,237,216,0.35);
            font-style: italic;
            min-height: 1em;
            font-family: 'EB Garamond', serif;
        }

        /* ── Sheet Surface (unified background) ─── */
        .sheet-surface {
            background: var(--parchment, #f5edd8);
            padding: 28px 32px 64px;
            max-width: 1020px;
            margin: 0 auto;
        }

        /* ── Stats Band ─────────────────────────── */
        .stats-band {
            display: flex;
            align-items: stretch;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            background: rgba(255,252,244,0.5);
            overflow: hidden;
        }
        .sb-cell {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 4px 8px;
            gap: 4px;
        }
        .sb-div-sm  { border-left: 1px solid rgba(100,80,40,0.32); }
        .sb-div-lg  { border-left: 2px solid rgba(180,140,60,0.65); }
        .sb-div-dash{ border-left: 1px dashed rgba(100,80,40,0.22); }
        .sb-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.52em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-dim);
            line-height: 1;
        }
        /* Evasion oval (portrait) */
        .sb-oval {
            position: relative;
            width: 38px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sb-oval svg { position:absolute; top:0; left:0; width:100%; height:100%; }
        .sb-oval-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
        }
        /* Armor score shield */
        .sb-armor-shield {
            position: relative;
            width: 40px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sb-armor-shield svg { position:absolute; top:0; left:0; width:100%; height:100%; }
        .sb-armor-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
        }
        /* Armor slot grid */
        .sb-slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            width: 72px;
        }
        .sb-slot-btn {
            width: 100%;
            aspect-ratio: 5/6;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s;
        }
        .sb-slot-btn:hover { transform: scale(1.12); }
        .sb-slot-btn svg { width:100%; height:100%; display:block; }
        .sb-slot-btn.slot-inactive { opacity:0.18; cursor:default; pointer-events:none; }
        /* Trait shield in band */
        .sb-shield {
            position: relative;
            width: 40px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sb-shield svg { position:absolute; top:0; left:0; width:100%; height:100%; }
        .sb-shield-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
        }

        /* ── Layout ─────────────────────────────── */
        .sheet-wrap {
            max-width: 1020px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ── Loading / Error ─────────────────────── */
        .loading-msg {
            text-align: center;
            padding: 80px 24px;
            color: var(--ink-muted);
            font-style: italic;
        }
        .auth-screen {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px;
        }
        .auth-screen h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.5em;
            color: var(--ink);
            margin-bottom: 12px;
        }
        .auth-screen p {
            color: var(--ink-muted);
            max-width: 400px;
            margin-bottom: 28px;
            line-height: 1.7;
        }
        .btn-google {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 0.95em;
            font-family: 'EB Garamond', serif;
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        .btn-google:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); width: 280px; }
        .auth-tab {
            flex: 1; padding: 8px 0;
            font-family: 'Cinzel', serif; font-size: 0.68em; letter-spacing: 0.1em; text-transform: uppercase;
            border: none; background: transparent; color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
        }
        .auth-tab.active { background: var(--gold); color: #f5edd8; }
        .auth-tab:not(.active):hover { color: var(--ink); }
        .auth-panel { display: none; width: 100%; max-width: 320px; }
        .auth-panel.active { display: block; }
        .auth-field { margin-bottom: 14px; text-align: left; }
        .auth-field label { display: block; font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 5px; }
        .auth-field input {
            width: 100%; background: rgba(248,242,228,0.6); border: 1px solid var(--border);
            padding: 9px 12px; font-family: 'EB Garamond', serif; font-size: 1em; color: var(--ink);
            outline: none; box-sizing: border-box; transition: border-color 0.15s;
        }
        .auth-field input:focus { border-color: var(--border-gold); }
        .auth-btn {
            width: 100%; font-family: 'Cinzel', serif; font-size: 0.72em; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 11px; border: 1px solid var(--gold); background: var(--gold);
            color: #f5edd8; cursor: pointer; transition: background 0.15s; margin-bottom: 10px;
        }
        .auth-btn:hover { background: var(--gold-mid); border-color: var(--gold-mid); }
        .auth-switch { font-size: 0.82em; color: var(--ink-dim); cursor: pointer; background: none; border: none; padding: 0; font-family: 'EB Garamond', serif; }
        .auth-switch:hover { color: var(--gold-mid); }

        /* ── Sheet Header ────────────────────────── */
        .sheet-header {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: start;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-gold);
        }
        .char-name {
            font-family: 'Cinzel', serif;
            font-size: 2em;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 3px;
        }
        .char-pronouns {
            font-size: 0.85em;
            color: var(--ink-dim);
            font-style: italic;
            margin-bottom: 6px;
        }
        .char-meta {
            font-family: 'Cinzel', serif;
            font-size: 0.72em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold-mid);
            margin-bottom: 8px;
        }
        .char-concept {
            font-size: 0.9em;
            color: var(--ink-muted);
            font-style: italic;
            line-height: 1.5;
        }
        .header-actions { display: flex; gap: 8px; flex-direction: column; align-items: flex-end; }
        .save-indicator {
            font-size: 0.72em;
            color: var(--ink-dim);
            font-style: italic;
            min-height: 1.2em;
            text-align: right;
        }

        /* ── Buttons ─────────────────────────────── */
        .btn {
            font-family: 'Cinzel', serif;
            font-size: 0.65em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 18px;
            border: 1px solid var(--gold);
            background: var(--gold);
            color: #f5edd8;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: var(--gold-mid); border-color: var(--gold-mid); }
        .btn-ghost {
            background: transparent;
            color: var(--ink-dim);
            border-color: var(--border);
        }
        .btn-ghost:hover { border-color: var(--border-gold); color: var(--ink); }

        /* ── Identity Row ────────────────────────── */
        .identity-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .id-box {
            background: rgba(248,242,228,0.55);
            border: 1px solid var(--border);
            padding: 10px 14px;
        }
        .id-box-label {
            font-family: 'Cinzel', serif;
            font-size: 0.58em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin-bottom: 3px;
        }
        .id-box-value {
            font-family: 'Cinzel', serif;
            font-size: 0.82em;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.3;
        }

        /* ── Traits Row ──────────────────────────── */
        .traits-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .trait-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        .trait-box-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin-bottom: 4px;
        }
        /* Shield shape */
        .trait-shield {
            position: relative;
            width: 52px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .trait-shield svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .trait-shield-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.35em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
            line-height: 1;
        }

        /* ── Top Two-Column Row (30 / 70) ──────── */
        .sheet-top-row {
            display: grid;
            grid-template-columns: 30% 1fr;
            gap: 20px;
            margin-bottom: 20px;
            align-items: start;
        }

        /* Left panel: horizontal row of three widgets */
        .top-left-panel {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
        }

        /* Right panel: traits + all stat trackers */
        .top-right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Evasion Oval (portrait) ─────────── */
        .evasion-oval-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .evasion-oval-label,
        .armor-main-label,
        .armor-section-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.55em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-dim);
        }
        .evasion-oval {
            position: relative;
            width: 52px;
            height: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .evasion-oval svg { position: absolute; top:0; left:0; width:100%; height:100%; }
        .evasion-oval-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.7em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
        }

        /* ── Armor Main Shield ───────────────── */
        .armor-main-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .armor-main-shield {
            position: relative;
            width: 56px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .armor-main-shield svg { position: absolute; top:0; left:0; width:100%; height:100%; }
        .armor-main-val {
            position: relative;
            font-family: 'Oswald', sans-serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--ink);
            z-index: 1;
        }

        /* ── Armor Slot Shield Grid ──────────── */
        .armor-section-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .armor-shield-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 90px;
        }
        .armor-shield-btn {
            width: 100%;
            aspect-ratio: 5/6;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .armor-shield-btn:hover { transform: scale(1.12); }
        .armor-shield-btn svg { width: 100%; height: 100%; }
        .armor-shield-btn.slot-inactive {
            opacity: 0.18;
            cursor: default;
            pointer-events: none;
        }

        /* ── Banner section labels (right column) ── */
        .stat-section { margin-bottom: 6px; }
        .stat-banner-label {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        .stat-banner-label .banner-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }
        .stat-banner-label .banner-text {
            position: relative;
            z-index: 1;
            font-family: 'Oswald', sans-serif;
            font-size: 0.6em;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold-mid);
            padding: 4px 22px;
            white-space: nowrap;
        }

        /* ── Health panel ─ */
        .health-panel {
            background: transparent;
            border: none;
            padding: 0;
        }
        .damage-flow {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 12px;
        }
        .dmg-chevron {
            flex: 1;
            background: #2a2420;
            color: #f5edd8;
            text-align: center;
            padding: 6px 4px 5px;
            clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
        }
        .dmg-chevron:first-child {
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);
        }
        .dmg-chevron:last-child {
            clip-path: polygon(8px 0, 100% 0, 100% 100%, 8px 100%, 0 50%);
        }
        .dmg-chevron-name {
            font-family: 'Oswald', sans-serif;
            font-size: 0.58em;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.1;
        }
        .dmg-chevron-hp {
            font-family: 'Oswald', sans-serif;
            font-size: 0.52em;
            opacity: 0.75;
            letter-spacing: 0.04em;
        }
        .dmg-threshold {
            flex: 0 0 auto;
            padding: 0 6px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.05em;
            font-weight: 700;
            color: var(--gold-mid);
            text-align: center;
            z-index: 1;
        }
        .tracker-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .tracker-row:last-child { margin-bottom: 0; }
        .tracker-row-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-dim);
            width: 46px;
            flex-shrink: 0;
        }
        .tracker-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tracker-slot {
            width: 22px;
            height: 22px;
            border-radius: 2px;
            border: 2px solid var(--border-mid);
            background: transparent;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }
        .tracker-slot.marked        { background: var(--gold);       border-color: var(--gold); }
        .tracker-slot.stress-marked { background: #8a2020;           border-color: #8a2020; }
        .tracker-slot.armor-marked  { background: var(--ink-muted);  border-color: var(--ink-muted); }
        .tracker-slot.slot-inactive { opacity: 0.18; cursor: default; pointer-events: none; }

        /* ── Hope diamonds ───────────────────────── */
        .hope-panel {
            background: transparent;
            border: none;
            padding: 0;
        }
        .hope-panel-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin-bottom: 8px;
        }
        .hope-diamonds {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }
        .hope-diamond {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .hope-diamond:hover { transform: scale(1.15); }
        .hope-diamond svg { width: 22px; height: 22px; }

        /* ── Proficiency + Armor panel ───────────── */
        .prof-armor-panel {
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .prof-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .prof-row-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-dim);
        }

            border: 1px solid var(--border-gold);

<script type="module">
import { auth, signInWithGoogle, emailSignIn, emailRegister, signOutUser, onAuthChange, getUserRole, getCharacter, updateCharacter } from './firebase-init.js';

const CLASS_DOMAINS = {
    warrior:'Blade,Bone', guardian:'Blade,Valor', ranger:'Bone,Sage',
    druid:'Arcana,Sage',  bard:'Grace,Splendor',  rogue:'Grace,Midnight',
    seraph:'Splendor,Valor', sorcerer:'Arcana,Midnight', wizard:'Codex,Arcana'
};
const TRAIT_NAMES = ['Agility','Strength','Finesse','Instinct','Presence','Knowledge'];

let currentUser = null;
let userRole    = 'player';
let char        = null;
let classes     = [];
let domainCards  = [];
let armorList    = [];
let weaponList   = [];
let lootItems    = [];
let ancestries   = [];
let communities  = [];
let saveTimer   = null;
let activeTab   = 'equipment';

function show(id) {
    ['view-loading','view-auth','view-sheet'].forEach(v => {
        document.getElementById(v).style.display = v === id ? '' : 'none';
    });
}

// Auth tab switcher
let emailAuthMode = 'signin';
window.switchAuthTab = (tab) => {
    document.getElementById('tab-google').classList.toggle('active', tab === 'google');
    document.getElementById('tab-email').classList.toggle('active', tab === 'email');
    document.getElementById('panel-google').classList.toggle('active', tab === 'google');
    document.getElementById('panel-email').classList.toggle('active', tab === 'email');
    document.getElementById('auth-error').style.display = 'none';
};

document.getElementById('btn-auth-mode-switch').addEventListener('click', () => {
    emailAuthMode = emailAuthMode === 'signin' ? 'register' : 'signin';
    document.getElementById('btn-email-submit').textContent = emailAuthMode === 'signin' ? 'Sign In' : 'Create Account';
    document.getElementById('btn-auth-mode-switch').textContent = emailAuthMode === 'signin' ? 'No account? Create one' : 'Already have an account? Sign in';
    document.getElementById('auth-error').style.display = 'none';
});

document.getElementById('btn-google-signin').addEventListener('click', async () => {
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    try { await signInWithGoogle(); }
    catch(e) {
        errEl.textContent = e.code === 'auth/unauthorized-domain'
            ? 'This domain is not authorized in Firebase. Add it under Authentication → Settings → Authorized Domains in the Firebase Console.'
            : (e.message || 'Sign-in failed. Check the browser console for details.');
        errEl.style.display = '';
    }
});

document.getElementById('btn-email-submit').addEventListener('click', async () => {
    const errEl    = document.getElementById('auth-error');
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = ''; return; }
    try {
        if (emailAuthMode === 'register') {
            await emailRegister(email, password);
        } else {
            await emailSignIn(email, password);
        }
    } catch(e) {
        const msgs = {
            'auth/email-already-in-use': 'An account with this email already exists.',
            'auth/invalid-email':        'Please enter a valid email address.',
            'auth/weak-password':        'Password must be at least 6 characters.',
            'auth/user-not-found':       'No account found with this email.',
            'auth/wrong-password':       'Incorrect password.',
            'auth/invalid-credential':   'Incorrect email or password.',
        };
        errEl.textContent = msgs[e.code] || e.message || 'Authentication failed.';
        errEl.style.display = '';
    }
});


onAuthChange(async user => {
    currentUser = user;
    if (!user) { show('view-auth'); return; }
    userRole = await getUserRole(user.uid);
    applyRoleToNav();
    await boot();
});

function applyRoleToNav() {
    document.querySelectorAll('[data-role]').forEach(el => {
        el.style.display = el.dataset.role === userRole ? '' : 'none';
    });
}

async function boot() {
    show('view-loading');
    const params = new URLSearchParams(window.location.search);
    const charId = params.get('id');
    if (!charId) {
        window.location.href = 'character-builder.html';
        return;
    }

    const [charData, classData, cardData, armorData, weaponData, lootData, ancestryData, communityData] = await Promise.all([
        getCharacter(currentUser.uid, charId),
        fetch('/data/base/classes.json').then(r => r.json()),
        fetch('/data/base/domain-cards.json').then(r => r.json()),
        fetch('/data/base/armor.json?v=3').then(r => r.json()),
        fetch('/data/base/weapons.json?v=3').then(r => r.json()),
        fetch('/data/base/loot.json').then(r => r.json()),
        fetch('/data/base/ancestries.json').then(r => r.json()),
        fetch('/data/base/communities.json').then(r => r.json()),
    ]);

    if (!charData) {
        document.getElementById('view-loading').textContent = 'Character not found.';
        return;
    }

    char        = charData;
    classes     = Array.isArray(classData)     ? classData     : Object.values(classData);
    domainCards = Array.isArray(cardData)       ? cardData      : Object.values(cardData);
    ancestries  = Array.isArray(ancestryData)   ? ancestryData  : Object.values(ancestryData);
    communities = Array.isArray(communityData)  ? communityData : Object.values(communityData);

    // Resolve equipment from source JSON using stored IDs (single source of truth)
    armorList  = Array.isArray(armorData)  ? armorData  : Object.values(armorData);
    weaponList = Array.isArray(weaponData) ? weaponData : Object.values(weaponData);
    lootItems  = [...(lootData.items || []), ...(lootData.consumables || [])];
    char.armor     = armorList.find(a => a.id === (char.armorId     ?? char.armor?.id))     ?? null;
    char.weapon    = weaponList.find(w => w.id === (char.weaponId    ?? char.weapon?.id))    ?? null;
    char.secondary = weaponList.find(w => w.id === (char.secondaryId ?? char.secondary?.id)) ?? null;
    // Keep IDs in sync so saves are always correct
    char.armorId     = char.armor?.id     ?? null;
    char.weaponId    = char.weapon?.id    ?? null;
    char.secondaryId = char.secondary?.id ?? null;

    if (!char.sheetState) char.sheetState = {};
    char.sheetState.hp    = char.sheetState.hp    ?? 0;
    char.sheetState.stress = char.sheetState.stress ?? 0;
    char.sheetState.hope  = char.sheetState.hope  ?? 2;
    char.sheetState.armor = char.sheetState.armor  ?? 0;
    char.sheetState.goldHandfuls = char.sheetState.goldHandfuls ?? (char.gold ?? 0);
    char.sheetState.goldBags     = char.sheetState.goldBags     ?? 0;
    char.sheetState.goldChest    = char.sheetState.goldChest    ?? 0;
    char.sheetState.extraInventory = char.sheetState.extraInventory ?? (char.extraInventory ?? '');
    char.sheetState.proficiency    = char.sheetState.proficiency    ?? 1;
    char.sheetState.loot           = char.sheetState.loot           ?? [];
    char.sheetState.fixedInv       = char.sheetState.fixedInv       ?? {};
    char.sheetState.learnedCards    = char.sheetState.learnedCards    ?? [];
    char.sheetState.cardLocations   = char.sheetState.cardLocations   ?? {};
    char.sheetState.cardState       = char.sheetState.cardState       ?? {};
    char.sheetState.personalHistory = char.sheetState.personalHistory ?? '';
    char.sheetState.inventoryWeapons = char.sheetState.inventoryWeapons ?? [];
    char.sheetState.inventoryArmor   = char.sheetState.inventoryArmor   ?? [];
    char.sheetState.level            = char.sheetState.level            ?? 1;
    char.sheetState.scars            = char.sheetState.scars            ?? 0;
    char.sheetState.conditions       = char.sheetState.conditions       ?? {};
    char.sheetState.extraHp          = char.sheetState.extraHp          ?? 0;
    char.sheetState.extraStress      = char.sheetState.extraStress      ?? 0;
    char.sheetState.evasionBonus     = char.sheetState.evasionBonus     ?? 0;
    char.sheetState.thresholdBonus   = char.sheetState.thresholdBonus   ?? { minor: 0, major: 0 };
    char.sheetState.traitBonuses     = char.sheetState.traitBonuses     ?? {};
    char.sheetState.traitMarks       = char.sheetState.traitMarks       ?? {};
    char.sheetState.multiclasses     = char.sheetState.multiclasses     ?? [];
    char.sheetState.tierSlots        = char.sheetState.tierSlots        ?? { traits: 0, hp: 0, stress: 0, evasion: 0, experiences: 0, extraDomain: 0, subclass: 0, proficiency: 0 };
    if (!char.sheetState.experiences) {
        char.sheetState.experiences = [char.exp1, char.exp2].filter(Boolean).map(name => ({ name, modifier: 2 }));
    }
    // Normalise domainCards — old saves used {domain:name} object format
    if (char.domainCards && !Array.isArray(char.domainCards)) {
        char.domainCards = Object.values(char.domainCards).filter(Boolean);
    }
    if (!char.domainCards) char.domainCards = [];

    renderSheet();
    show('view-sheet');
}

// ── Debounced save ────────────────────────────────────────────────────────────
function scheduleSave() {
    const ind = document.getElementById('save-indicator');
    ind.textContent = 'Saving…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        try {
            await updateCharacter(currentUser.uid, char.id, {
                sheetState: char.sheetState,
                concept: char.concept ?? '',
                backgroundAnswers: char.backgroundAnswers ?? [],
            });
            ind.textContent = 'Saved';
            setTimeout(() => { if (ind.textContent === 'Saved') ind.textContent = ''; }, 2000);
        } catch(e) {
            ind.textContent = 'Save failed';
            console.error(e);
        }
    }, 1000);
}

// ── Slot tracker helpers ──────────────────────────────────────────────────────
function makeSlots(count, markedCount, markedClass, onToggle, totalCount) {
    const renderCount = totalCount ?? count;
    const wrap = document.createElement('div');
    wrap.className = 'tracker-slots';
    for (let i = 0; i < renderCount; i++) {
        const slot = document.createElement('button');
        slot.type = 'button';
        const inactive = i >= count;
        let cls = 'tracker-slot';
        if (!inactive && i < markedCount) cls += ` ${markedClass}`;
        if (inactive) cls += ' slot-inactive';
        slot.className = cls;
        if (!inactive) {
            slot.addEventListener('click', () => {
                const newVal = (i < markedCount) ? i : i + 1;
                onToggle(newVal);
            });
        }
        wrap.appendChild(slot);
    }
    return wrap;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSheet() {
    const cls = classes.find(c => c.id === char.classId) || {};
    const domains = CLASS_DOMAINS[char.classId]?.split(',') || [];

    // Banner
    document.title = `${char.name || 'Character'} — Brackenroll`;
    document.getElementById('char-name').textContent = char.name || 'Unnamed Character';
    document.getElementById('char-sub').textContent =
        [char.community, char.ancestry].filter(Boolean).join(' ');
    document.getElementById('char-meta').textContent =
        [cls.name, char.subclassName].filter(Boolean).join(' · ');
    const conceptEl = document.getElementById('char-concept');
    conceptEl.textContent = char.concept ? `"${char.concept}"` : '';
    conceptEl.style.display = char.concept ? '' : 'none';
    const pronounsEl = document.getElementById('char-pronouns');
    pronounsEl.textContent = char.pronouns || '';
    pronounsEl.style.display = char.pronouns ? '' : 'none';
    document.getElementById('char-domains').textContent =
        domains.length ? domains.join(' & ') : '';

    const levelEl = document.getElementById('char-level');
    const lvl = char.sheetState.level ?? 1;
    levelEl.textContent = `Level ${lvl}`;
    const lvlBtn = document.createElement('button');
    lvlBtn.type = 'button'; lvlBtn.className = 'level-up-btn'; lvlBtn.textContent = 'Level Up';
    lvlBtn.addEventListener('click', openLevelUpModal);
    levelEl.appendChild(lvlBtn);

    // Rest buttons
    const restEl = document.getElementById('char-rest');
    restEl.innerHTML = '';
    const shortRestBtn = document.createElement('button');
    shortRestBtn.type = 'button'; shortRestBtn.className = 'rest-btn';
    shortRestBtn.textContent = 'Short Rest';
    shortRestBtn.addEventListener('click', () => openRestOverlay('short'));
    const longRestBtn = document.createElement('button');
    longRestBtn.type = 'button'; longRestBtn.className = 'rest-btn';
    longRestBtn.textContent = 'Long Rest';
    longRestBtn.addEventListener('click', () => openRestOverlay('long'));
    restEl.append(shortRestBtn, longRestBtn);

    // Stats band: evasion | armor | slots || traits
    renderStatsBand(cls, computeEquipBonuses());

    // Trackers: HP, Stress, Hope, Proficiency
    renderTrackers(cls);

    // Damage thresholds row (full width, below trackers)
    renderThresholds();

    // Sheet body
    renderBody(cls, domains);
}

const EQUIP_FEATURE_EFFECTS = {
    'Flexible':   { evasion: +1 },
    'Heavy':      { evasion: -1 },
    'Very Heavy': { evasion: -2, Agility: -1 },
    'Massive':    { evasion: -1 },
    'Cumbersome': { Finesse: -1 },
    'Protective': { armorScore: +1 },
    'Barrier':    { armorScore: +2, evasion: -1 },
    'Gilded':     { Presence: +1 },
    'Difficult':  { evasion: -1, Agility: -1, Strength: -1, Finesse: -1, Instinct: -1, Presence: -1, Knowledge: -1 },
};

function computeEquipBonuses() {
    const bonuses = { evasion: 0, armorScore: 0, traits: {} };
    [char.weapon, char.armor, char.secondary].forEach(item => {
        if (!item?.feature) return;
        const keyword = item.feature.split(':')[0].trim();
        const effects = EQUIP_FEATURE_EFFECTS[keyword];
        if (!effects) return;
        if (effects.evasion)    bonuses.evasion    += effects.evasion;
        if (effects.armorScore) bonuses.armorScore += effects.armorScore;
        ['Agility','Strength','Finesse','Instinct','Presence','Knowledge'].forEach(t => {
            if (effects[t]) bonuses.traits[t] = (bonuses.traits[t] ?? 0) + effects[t];
        });
    });
    return bonuses;
}

function renderStatsBand(cls, equipBonuses) {
    equipBonuses = equipBonuses ?? computeEquipBonuses();
    const band = document.getElementById('stats-band');
    band.innerHTML = '';
    const rerender = () => renderStatsBand(classes.find(c => c.id === char.classId) || {});

    function mkCell(divClass) {
        const d = document.createElement('div');
        d.className = 'sb-cell' + (divClass ? ' ' + divClass : '');
        return d;
    }
    function mkLabel(text) {
        const d = document.createElement('div');
        d.className = 'sb-label';
        d.textContent = text;
        return d;
    }

    // ── Evasion ──
    const evCell = mkCell();
    const evOval = document.createElement('div');
    evOval.className = 'sb-oval';
    evOval.innerHTML = `
        <svg viewBox="0 0 38 54" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="19" cy="27" rx="17" ry="25"
                fill="rgba(248,242,228,0.9)" stroke="var(--border-gold)" stroke-width="1.5"/>
        </svg>
        <span class="sb-oval-val">${cls.startingEvasion != null ? (cls.startingEvasion + (char.sheetState.evasionBonus ?? 0) + equipBonuses.evasion) : '—'}</span>`;
    evCell.appendChild(evOval);
    evCell.appendChild(mkLabel('Evasion'));
    band.appendChild(evCell);

    // ── Armor score ── (small divider on left)
    const armorScore = (char.armor?.armorScore ?? 0) + equipBonuses.armorScore;
    const arCell = mkCell('sb-div-sm');
    const arShield = document.createElement('div');
    arShield.className = 'sb-armor-shield';
    arShield.innerHTML = `
        <svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2L2 9v14c0 12 9 21 18 23 9-2 18-11 18-23V9Z"
                fill="rgba(248,242,228,0.9)" stroke="var(--border-gold)" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="sb-armor-val">${armorScore}</span>`;
    arCell.appendChild(arShield);
    arCell.appendChild(mkLabel('Armor'));
    band.appendChild(arCell);

    // ── Armor slots ── (no divider — grouped with armor)
    const markedCount = char.sheetState.armor ?? 0;
    const slotCell = mkCell();
    const slotGrid = document.createElement('div');
    slotGrid.className = 'sb-slot-grid';
    for (let i = 0; i < 12; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        const active = i < armorScore;
        const filled = i < markedCount;
        btn.className = 'sb-slot-btn' + (active ? '' : ' slot-inactive');
        btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 6v5c0 5.5 3.84 10.74 9 12 5.16-1.26 9-6.5 9-12V6z"
                fill="${filled ? '#6b5a3e' : 'none'}"
                stroke="${filled ? '#6b5a3e' : 'var(--border-mid)'}"
                stroke-width="1.5" stroke-linejoin="round"/>
        </svg>`;
        if (active) {
            btn.addEventListener('click', () => {
                char.sheetState.armor = (i < markedCount) ? i : i + 1;
                scheduleSave(); rerender();
            });
        }
        slotGrid.appendChild(btn);
    }
    slotCell.appendChild(slotGrid);
    slotCell.appendChild(mkLabel('Slots'));
    band.appendChild(slotCell);

    // ── 6 Traits ── (first has big divider, rest have dashed)
    TRAIT_NAMES.forEach((t, idx) => {
        const trCell = mkCell(idx === 0 ? 'sb-div-lg' : 'sb-div-dash');
        const raw = char.traits?.[t];
        const base = raw != null ? parseFloat(raw) : null;
        const bonus = (char.sheetState.traitBonuses?.[t] ?? 0) + (equipBonuses.traits[t] ?? 0);
        const total = (base != null && !isNaN(base)) ? base + bonus : null;
        const val = total != null ? (total > 0 ? `+${total}` : `${total}`) : (raw ?? '—');
        const isMarked = !!char.sheetState.traitMarks?.[t];
        const shieldFill = isMarked ? 'rgba(107,90,62,0.3)' : 'rgba(248,242,228,0.8)';
        const shield = document.createElement('div');
        shield.className = 'sb-shield';
        shield.style.position = 'relative';
        shield.innerHTML = `
            <svg viewBox="0 0 40 46" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,2 L38,8 L38,24 C38,35 20,44 20,44 C20,44 2,35 2,24 L2,8 Z" fill="${shieldFill}" stroke="var(--border-mid)" stroke-width="1.5"/>
            </svg>
            <span class="sb-shield-val">${val}</span>`;
        if (isMarked) {
            const mark = document.createElement('span');
            mark.style.cssText = 'position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:1px solid var(--border-gold);';
            shield.appendChild(mark);
        }
        trCell.appendChild(shield);
        trCell.appendChild(mkLabel(t));
        band.appendChild(trCell);
    });

    // Spellcast trait indicator (caster classes only)
    if (cls.spellcastTrait) {
        const scCell = mkCell('sb-div-dash');
        const scIcon = document.createElement('div');
        scIcon.style.cssText = 'font-family:Cinzel,serif;font-size:0.72em;font-weight:700;color:var(--gold-mid);line-height:1;';
        scIcon.textContent = cls.spellcastTrait;
        scCell.appendChild(scIcon);
        scCell.appendChild(mkLabel('Spellcast'));
        band.appendChild(scCell);
    }
}

        btn.className = 'hope-diamond';

            ? `<svg viewBox="0 0 24 24"><polygon points="12,1 23,12 12,23 1,12" fill="var(--gold)" stroke="var(--gold-mid)" stroke-width="1"/></svg>`
            : `<svg viewBox="0 0 24 24"><polygon points="12,1 23,12 12,23 1,12" fill="none" stroke="var(--border-mid)" stroke-width="1.5"/></svg>`;

function makeEquipPicker(slots, onChange) {
    const wrap = document.createElement('div');
    slots.forEach(({ key, label, current, items, tier }) => {
        const section = document.createElement('div');
        section.className = 'equip-edit-picker';
        const lbl = document.createElement('div');
        lbl.className = 'equip-edit-picker-label';
        lbl.textContent = label;
        section.appendChild(lbl);
        const grid = document.createElement('div');
        grid.className = 'equip-pick-grid';
        // None option
        const noneCard = document.createElement('div');
        noneCard.className = 'equip-pick-card' + (!current ? ' selected' : '');
        noneCard.innerHTML = `<div>None</div>`;
        noneCard.addEventListener('click', () => { onChange(key, null); });
        grid.appendChild(noneCard);
        items.filter(i => i.tier <= (tier + 1)).forEach(item => {
            const card = document.createElement('div');
            card.className = 'equip-pick-card' + (current?.id === item.id ? ' selected' : '');
            const sub = item.armorScore
                ? `Minor ${item.minorThreshold} · ${item.armorScore} Slots`
                : `${item.trait} · ${item.range} · ${(item.damage||'').replace(/^(\d+)?(d)/,'1$2').toUpperCase()}${(item.damageType||'').toUpperCase()}`;
            card.innerHTML = `<div>${item.name}</div><div class="pick-sub">${sub}</div>`;
            card.addEventListener('click', () => { onChange(key, item); });
            grid.appendChild(card);
        });
        section.appendChild(grid);
        wrap.appendChild(section);
    });
    return wrap;
}

function renderBody(cls, domains) {
    const body = document.getElementById('sheet-body');
    body.innerHTML = '';

    function secTitle(text) {
        return `<div class="section-title"><span class="section-title-inner">${text}</span></div>`;
    }
    function weaponDamageStr(w) {
        const prof = char.sheetState.proficiency ?? 1;
        const dmg = (w.damage || 'd6').replace(/^(\d+)?(d)/, `${prof}$2`);
        const type = (w.damageType || '').toUpperCase();
        return `${dmg}${type}`;
    }

    // ── Left column (40%) ──
    const left = document.createElement('div');
    left.className = 'body-col';

    // ── 1. Damage & Health ──
    const dhSec = document.createElement('div');
    dhSec.className = 'sheet-section';
    dhSec.innerHTML = secTitle('Damage & Health');
    {
        const charLvl = char.sheetState.level ?? 1;
        let major, severe, armorLabel;
        if (char.armor) {
            const a = char.armor;
            major = (a.majorThreshold ?? 0) + charLvl;
            severe = major * 2;
            armorLabel = null;
        } else {
            major = charLvl;
            severe = charLvl * 2;
            armorLabel = 'Unarmored';
        }
        const minor = major; // "below Major" is anything under major threshold
        const flow = document.createElement('div');
        flow.className = 'damage-flow';
        flow.style.marginBottom = '12px';
        if (armorLabel) {
            const lbl = document.createElement('div');
            lbl.style.cssText = 'font-size:0.65em;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);text-align:center;margin-bottom:6px;';
            lbl.textContent = armorLabel;
            dhSec.appendChild(lbl);
        }
        flow.innerHTML = `
            <div class="dmg-chevron"><div class="dmg-chevron-name">Minor</div><div class="dmg-chevron-hp">Mark 1 HP</div></div>
            <div class="dmg-threshold">${minor}</div>
            <div class="dmg-chevron"><div class="dmg-chevron-name">Major</div><div class="dmg-chevron-hp">Mark 2 HP</div></div>
            <div class="dmg-threshold">${severe}</div>
            <div class="dmg-chevron"><div class="dmg-chevron-name">Severe</div><div class="dmg-chevron-hp">Mark 3 HP</div></div>`;
        dhSec.appendChild(flow);
    }
    const maxHp = (cls.startingHp ?? 6) + (char.sheetState.extraHp ?? 0);
    const maxStress = 6 + (char.sheetState.extraStress ?? 0);
    const hpRow = document.createElement('div');
    hpRow.className = 'tracker-row';
    hpRow.innerHTML = `<span class="tracker-row-label">HP</span>`;
    hpRow.appendChild(makeSlots(maxHp, char.sheetState.hp, 'marked', val => {
        char.sheetState.hp = val; scheduleSave(); renderBody(cls, domains);
    }, 12));
    dhSec.appendChild(hpRow);
    const stressRow = document.createElement('div');
    stressRow.className = 'tracker-row';
    stressRow.innerHTML = `<span class="tracker-row-label">Stress</span>`;
    stressRow.appendChild(makeSlots(maxStress, char.sheetState.stress, 'stress-marked', val => {
        char.sheetState.stress = val; scheduleSave(); renderBody(cls, domains);
    }, 12));
    dhSec.appendChild(stressRow);
    if ((char.sheetState.stress ?? 0) >= maxStress) {
        const vulnBadge = document.createElement('div');
        vulnBadge.style.cssText = 'margin-top:8px;padding:4px 10px;background:rgba(160,50,50,0.12);border:1px solid rgba(160,50,50,0.4);border-radius:4px;font-family:Cinzel,serif;font-size:0.65em;letter-spacing:0.1em;text-transform:uppercase;color:rgba(160,50,50,0.9);text-align:center;';
        vulnBadge.textContent = 'Vulnerable — clear 1 Stress to remove';
        dhSec.appendChild(vulnBadge);
    }
    left.appendChild(dhSec);

    // ── 1b. Conditions ──
    const condSec = document.createElement('div');
    condSec.className = 'sheet-section';
    condSec.innerHTML = secTitle('Conditions');
    const CONDITIONS = [
        { key: 'vulnerable',  label: 'Vulnerable',  tip: 'All rolls against you have advantage.' },
        { key: 'hidden',      label: 'Hidden',       tip: 'Can\'t be directly targeted. First attack from hidden has advantage.' },
        { key: 'restrained',  label: 'Restrained',   tip: 'Can\'t move. Attacks against you have advantage; your attacks have disadvantage.' },
        { key: 'stunned',     label: 'Stunned',      tip: 'Can\'t act, react, or move. All rolls against you have advantage.' },
        { key: 'onFire',      label: 'On Fire',      tip: 'Take extra fire damage at end of your action if still on fire.' },
        { key: 'enraptured',  label: 'Enraptured',   tip: 'Attention fixed on caster. Narrow field of view; some actions force Stress or end condition.' },
    ];
    const condGrid = document.createElement('div');
    condGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;';
    const conds = char.sheetState.conditions;
    CONDITIONS.forEach(({ key, label, tip }) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.title = tip;
        const active = !!conds[key];
        btn.style.cssText = `font-family:Cinzel,serif;font-size:0.62em;letter-spacing:0.07em;text-transform:uppercase;padding:3px 9px;border-radius:3px;cursor:pointer;transition:all 0.15s;border:1px solid ${active ? 'rgba(160,50,50,0.7)' : 'var(--border)'};background:${active ? 'rgba(160,50,50,0.12)' : 'transparent'};color:${active ? 'rgba(160,50,50,0.9)' : 'var(--ink-dim)'};`;
        btn.textContent = label;
        btn.addEventListener('click', () => {
            conds[key] = !conds[key];
            scheduleSave(); renderBody(cls, domains);
        });
        condGrid.appendChild(btn);
    });
    condSec.appendChild(condGrid);
    left.appendChild(condSec);

    // ── 2. Hope ──
    const hopeSec = document.createElement('div');
    hopeSec.className = 'sheet-section';
    hopeSec.innerHTML = secTitle('Hope');
    const hopeCount = char.sheetState.hope ?? 0;
    const scarCount = char.sheetState.scars ?? 0;
    const maxHopeSlots = 6; // total physical slots
    const activeSlots = maxHopeSlots - scarCount; // usable slots
    // Clamp stored hope to active slots
    if (hopeCount > activeSlots) { char.sheetState.hope = activeSlots; }
    const diamondWrap = document.createElement('div');
    diamondWrap.className = 'hope-diamonds';
    for (let i = 0; i < maxHopeSlots; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'hope-diamond';
        const isScar = i >= activeSlots;
        if (isScar) {
            // Crossed-out slot
            btn.disabled = true;
            btn.style.opacity = '0.35';
            btn.title = 'Scarred slot';
            btn.innerHTML = `<svg viewBox="0 0 24 24">
                <polygon points="12,1 23,12 12,23 1,12" fill="rgba(100,50,50,0.2)" stroke="rgba(140,70,70,0.5)" stroke-width="1.5"/>
                <line x1="5" y1="5" x2="19" y2="19" stroke="rgba(140,70,70,0.7)" stroke-width="2"/>
            </svg>`;
        } else {
            const filled = i < hopeCount;
            btn.innerHTML = filled
                ? `<svg viewBox="0 0 24 24"><polygon points="12,1 23,12 12,23 1,12" fill="var(--gold)" stroke="var(--gold-mid)" stroke-width="1"/></svg>`
                : `<svg viewBox="0 0 24 24"><polygon points="12,1 23,12 12,23 1,12" fill="none" stroke="var(--border-mid)" stroke-width="1.5"/></svg>`;
            btn.addEventListener('click', () => {
                char.sheetState.hope = (i < hopeCount) ? i : i + 1;
                scheduleSave(); renderBody(cls, domains);
            });
        }
        diamondWrap.appendChild(btn);
    }
    hopeSec.appendChild(diamondWrap);
    // Scar controls
    const scarRow = document.createElement('div');
    scarRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);';
    const scarLbl = document.createElement('span');
    scarLbl.style.cssText = 'font-family:Cinzel,serif;font-size:0.6em;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-dim);flex:1;';
    scarLbl.textContent = scarCount > 0 ? `Scars: ${scarCount}` : 'Scars';
    const scarAddBtn = document.createElement('button');
    scarAddBtn.type = 'button';
    scarAddBtn.style.cssText = 'font-family:Cinzel,serif;font-size:0.6em;letter-spacing:0.06em;padding:2px 8px;border:1px solid rgba(140,70,70,0.5);background:transparent;color:rgba(140,70,70,0.8);cursor:pointer;border-radius:3px;';
    scarAddBtn.textContent = '+ Scar';
    scarAddBtn.title = 'Take a Scar — permanently cross out one Hope slot (Avoid Death)';
    scarAddBtn.addEventListener('click', () => {
        if (char.sheetState.scars < maxHopeSlots) {
            char.sheetState.scars++;
            if (char.sheetState.hope > maxHopeSlots - char.sheetState.scars)
                char.sheetState.hope = maxHopeSlots - char.sheetState.scars;
            scheduleSave(); renderBody(cls, domains);
        }
    });
    scarRow.append(scarLbl, scarAddBtn);
    if (scarCount > 0) {
        const scarRemBtn = document.createElement('button');
        scarRemBtn.type = 'button';
        scarRemBtn.style.cssText = 'font-family:Cinzel,serif;font-size:0.6em;letter-spacing:0.06em;padding:2px 8px;border:1px solid var(--border);background:transparent;color:var(--ink-dim);cursor:pointer;border-radius:3px;';
        scarRemBtn.textContent = '− Heal';
        scarRemBtn.title = 'Heal a Scar (GM discretion — downtime project or quest reward)';
        scarRemBtn.addEventListener('click', () => {
            if (char.sheetState.scars > 0) { char.sheetState.scars--; scheduleSave(); renderBody(cls, domains); }
        });
        scarRow.appendChild(scarRemBtn);
    }
    hopeSec.appendChild(scarRow);
    if (cls?.hopeFeature) {
        const hf = cls.hopeFeature;
        const hfEl = document.createElement('div');
        hfEl.style.cssText = 'margin-top:10px;padding-top:8px;border-top:1px solid var(--border);';
        const hfName = document.createElement('div');
        hfName.style.cssText = 'font-family:Cinzel,serif;font-size:0.7em;font-weight:700;letter-spacing:0.06em;color:var(--gold-mid);margin-bottom:3px;';
        hfName.textContent = hf.name || '';
        const hfDesc = document.createElement('div');
        hfDesc.style.cssText = 'font-family:"EB Garamond",serif;font-size:0.8em;color:var(--ink-muted);line-height:1.5;';
        const tmp = document.createElement('div'); tmp.innerHTML = hf.description || '';
        hfDesc.textContent = tmp.textContent;
        hfEl.append(hfName, hfDesc);
        hopeSec.appendChild(hfEl);
    }
    left.appendChild(hopeSec);

    // ── 3. Experiences ──
    const expSec = document.createElement('div');
    expSec.className = 'sheet-section';
    expSec.innerHTML = secTitle('Experiences') +
        `<p style="font-size:0.78em;color:var(--ink-dim);margin:-8px 0 10px;text-align:center;">Spend 1 Hope to add +2 to a roll</p>`;
    const exps = char.sheetState.experiences ?? [];
    if (exps.length) {
        expSec.innerHTML += exps.map(e => `
            <div class="exp-item" style="display:flex;align-items:center;justify-content:space-between;">
                <span>${e.name}</span>
                <span style="font-family:'Cinzel',serif;font-size:0.85em;font-weight:700;color:var(--gold-mid);margin-left:12px;flex-shrink:0;">+${e.modifier}</span>
            </div>`).join('');
    } else {
        expSec.innerHTML += `<p style="font-size:0.85em;color:var(--ink-dim);font-style:italic;">No experiences recorded.</p>`;
    }
    left.appendChild(expSec);

    // ── 4. Gold ──
    const goldSec = document.createElement('div');
    goldSec.className = 'sheet-section';
    goldSec.innerHTML = secTitle('Gold');
    const goldBlock = document.createElement('div');
    goldBlock.className = 'gold-block';
    [
        { key: 'goldHandfuls', label: 'Handfuls' },
        { key: 'goldBags',     label: 'Bags'     },
        { key: 'goldChest',    label: 'Chest'    },
    ].forEach(({ key, label }) => {
        const denom = document.createElement('div');
        denom.className = 'gold-denomination';
        const controls = document.createElement('div');
        controls.className = 'gold-controls';
        const minus = document.createElement('button');
        minus.type = 'button'; minus.className = 'gold-btn'; minus.textContent = '−';
        const input = document.createElement('input');
        input.type = 'number'; input.className = 'gold-input'; input.min = '0';
        input.value = char.sheetState[key] ?? 0;
        const plus = document.createElement('button');
        plus.type = 'button'; plus.className = 'gold-btn'; plus.textContent = '+';
        const sync = () => { char.sheetState[key] = parseInt(input.value) || 0; scheduleSave(); };
        minus.addEventListener('click', () => { const v = parseInt(input.value)||0; if(v>0){input.value=v-1;sync();} });
        plus.addEventListener('click',  () => { input.value=(parseInt(input.value)||0)+1; sync(); });
        input.addEventListener('change', sync);
        controls.append(minus, input, plus);
        const lbl = document.createElement('span');
        lbl.className = 'gold-label';
        lbl.textContent = label;
        denom.append(controls, lbl);
        goldBlock.appendChild(denom);
    });
    goldSec.appendChild(goldBlock);
    left.appendChild(goldSec);

    // ── 5. Class Feature ──
    const cfSec = document.createElement('div');
    cfSec.className = 'sheet-section';
    cfSec.innerHTML = secTitle('Class Feature');
    const classFeatures = cls.classFeatures || [];
    if (classFeatures.length) {
        cfSec.innerHTML += classFeatures.map(f =>
            typeof f === 'string'
                ? `<div class="feature-item"><div class="feature-desc">${f}</div></div>`
                : `<div class="feature-item">${f.name ? `<div class="feature-name">${f.name}</div>` : ''}<div class="feature-desc">${f.description || ''}</div></div>`
        ).join('');
    } else {
        cfSec.innerHTML += `<p style="font-size:0.85em;color:var(--ink-dim);font-style:italic;">No class features found.</p>`;
    }
    left.appendChild(cfSec);

    // ── Right column (60%) ──
    const right = document.createElement('div');
    right.className = 'body-col';

    // ── Tabs ──
    const TAB_NAMES = ['equipment', 'inventory', 'abilities', 'domains', 'bio', 'level', 'notes'];
    const tabBar = document.createElement('div');
    tabBar.className = 'right-tabs';
    const tabPanels = {};
    TAB_NAMES.forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'right-tab' + (activeTab === t ? ' active' : '');

    function saveEquipment() {
        updateCharacter(currentUser.uid, char.id, {
            weaponId: char.weaponId, secondaryId: char.secondaryId,
            armorId: char.armorId, sheetState: char.sheetState,
        });
    }
    function equipWeapon(slot, weapon) {
        // Block equipping secondary while a two-handed primary is equipped
        if (slot === 'secondary' && char.weapon?.burden === 'Two-Handed') return;
        // Send current equipped back to inventory (if any)
        if (slot === 'primary' && char.weapon) {
            if (!char.sheetState.inventoryWeapons.includes(char.weapon.id))
                char.sheetState.inventoryWeapons.push(char.weapon.id);
        }
        if (slot === 'secondary' && char.secondary) {
            if (!char.sheetState.inventoryWeapons.includes(char.secondary.id))
                char.sheetState.inventoryWeapons.push(char.secondary.id);
        }
        // Equipping a two-handed primary boots the secondary to inventory
        if (slot === 'primary' && weapon.burden === 'Two-Handed' && char.secondary) {
            if (!char.sheetState.inventoryWeapons.includes(char.secondary.id))
                char.sheetState.inventoryWeapons.push(char.secondary.id);
            char.secondary = null; char.secondaryId = null;
        }
        // Remove weapon from inventory pool
        char.sheetState.inventoryWeapons = char.sheetState.inventoryWeapons.filter(id => id !== weapon.id);
        if (slot === 'primary') { char.weapon = weapon; char.weaponId = weapon.id; }
        else                    { char.secondary = weapon; char.secondaryId = weapon.id; }
        saveEquipment(); renderBody(cls, domains); renderStatsBand(cls);
    }
    function unequipWeapon(slot) {
        const w = slot === 'primary' ? char.weapon : char.secondary;
        if (!w) return;
        if (!char.sheetState.inventoryWeapons.includes(w.id))
            char.sheetState.inventoryWeapons.push(w.id);
        if (slot === 'primary') { char.weapon = null; char.weaponId = null; }
        else                    { char.secondary = null; char.secondaryId = null; }
        saveEquipment(); renderBody(cls, domains); renderStatsBand(cls);
    }
    function equipArmor(armor) {
        if (char.armor) {
            if (!char.sheetState.inventoryArmor.includes(char.armor.id))
                char.sheetState.inventoryArmor.push(char.armor.id);
        }
        char.sheetState.inventoryArmor = char.sheetState.inventoryArmor.filter(id => id !== armor.id);
        char.armor = armor; char.armorId = armor.id; char.sheetState.armor = 0;
        saveEquipment(); renderBody(cls, domains); renderStatsBand(cls);
    }
    function unequipArmor() {
        if (!char.armor) return;
        if (!char.sheetState.inventoryArmor.includes(char.armor.id))
            char.sheetState.inventoryArmor.push(char.armor.id);
